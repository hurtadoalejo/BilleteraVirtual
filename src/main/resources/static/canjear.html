<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canjear</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 900px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .nota {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 15px;
    }

    .form-row label {
      width: 40%;
      font-size: 14px;
      color: #64748b;
    }

    .form-row select,
    .form-row input {
      width: 60%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .canjear-btn {
      margin-top: 20px;
      margin-left: auto;
      display: block;
    }

    .input-group {
      width: 60%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .input-group input {
      width: 100%;
    }

    #error-msg {
      color: #ff6b6b;
      font-size: 13px;
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      width: 100%;
    }

    .input-error {
      animation: shake 0.3s;
      border: 2px solid #ff9b9b !important;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    .lista {
      display: flex;
      flex-direction: column;
      gap: 15px;
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
      min-height: 0;
    }

    .historial-item {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .historial-info {
      display: flex;
      flex-direction: column;
    }

    .historial-fecha {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .historial-meta {
      font-size: 13px;
      color: #64748b;
    }

    .lista-animada {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    .lista-animada.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .paginacion {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding-top: 20px;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background: rgba(77, 130, 188, 0.85);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .popup-content p {
      margin-bottom: 20px;
    }

    .popup-content button {
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      cursor: pointer;
    }

    .popup-content button:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .hidden {
      display: none;
    }

    input[readonly] {
      background: #f1f5f9;
      color: #64748b;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <nav class="sidebar">

    <div class="nav-group">
      <a href="/home.html" class="nav-item"><img src="images/home.svg"><span>Inicio</span></a>
      <a href="/billetera.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/recargar.html" class="nav-item"><img src="images/recargar.svg"><span>Recargar</span></a>
      <a href="/retirar.html" class="nav-item"><img src="images/retirar.svg"><span>Retirar</span></a>
      <a href="/transferir.html" class="nav-item"><img src="images/transferir.svg"><span>Transferir</span></a>
      <a href="/programar.html" class="nav-item"><img src="images/programar.svg"><span>Programar</span></a>
      <a href="/historial.html" class="nav-item"><img src="images/historial.svg"><span>Historial</span></a>
      <a href="/canjear.html" class="nav-item"><img src="images/canjear.svg"><span>Canjear</span></a>
      <a href="/soporte.html" class="nav-item"><img src="images/support.svg"><span>Soporte</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>

  </nav>

  <div class="content">

    <div class="container">

      <h1 class="titulo">Canjear puntos</h1>

      <div class="nota">
        Cada punto equivale a 5 pesos
      </div>

      <div class="card">

        <div class="form-row">
          <label>Billetera destino</label>
          <select id="billeteraSelect"></select>
        </div>

        <div class="form-row">

          <label>Puntos a canjear</label>

          <div class="input-group">
            <input type="text" inputmode="numeric" oninput="formatearMiles(this)" id="puntos">
            <div id="error-msg"></div>
          </div>

        </div>

        <div class="form-row">
          <label>Dinero recibido</label>
          <input type="text" id="dinero" readonly>
        </div>

        <button class="btn canjear-btn" onclick="canjear()">
          Canjear
        </button>

      </div>

      <div id="lista" class="lista"></div>

      <div id="paginacion" class="paginacion"></div>

    </div>

  </div>

  <div id="popup" class="popup hidden">

    <div class="popup-content">

      <p id="popup-message"></p>

      <button onclick="cerrarPopup()">
        Aceptar
      </button>

    </div>

  </div>

  <script>

    const usuario = JSON.parse(
      sessionStorage.getItem("usuario")
    );

    if (!usuario) {
      window.location.href = "/login.html";
    }

    let billeteras = [];
    let beneficios = [];

    let paginaActual = 1;
    const porPagina = 3;

    async function actualizarUsuario() {

      const res = await fetch(
        `http://localhost:8080/usuarios/${usuario.cedula}`
      );

      const usuarioActualizado = await res.json();

      sessionStorage.setItem(
        "usuario",
        JSON.stringify(usuarioActualizado)
      );

      Object.assign(usuario, usuarioActualizado);
    }

    async function cargarBilleteras() {

      const res = await fetch(
        `http://localhost:8080/billeteras/${usuario.cedula}`
      );

      const data = await res.json();

      billeteras = data;

      const select = document.getElementById(
        "billeteraSelect"
      );

      select.innerHTML = "";

      data.forEach(b => {

        select.innerHTML += `
          <option value="${b.id}">
            ${b.nombre}
          </option>
        `;
      });
    }

    async function cargarHistorial() {

      const res = await fetch(
        `http://localhost:8080/beneficios/historial/${usuario.cedula}`
      );

      beneficios = await res.json();

      beneficios.sort((a, b) =>
        new Date(b.fecha) - new Date(a.fecha)
      );

      paginaActual = 1;

      renderHistorial(true);
    }

    function renderHistorial(sinAnimacion = false) {

      const lista = document.getElementById("lista");

      if (!sinAnimacion) {

        lista.classList.add("fade");

        setTimeout(() => dibujar(), 200);

      } else {

        dibujar();
      }

      function dibujar() {

        lista.classList.remove("fade");
        lista.classList.add("lista-animada");

        lista.innerHTML = "";

        const inicio = (paginaActual - 1) * porPagina;
        const fin = inicio + porPagina;

        const pagina = beneficios.slice(inicio, fin);

        pagina.forEach(b => {

          lista.innerHTML += `
            <div class="historial-item">

              <div class="historial-info">

                <span class="historial-fecha">
                  ${formatearFecha(b.fecha)}
                </span>

                <span class="historial-meta">
                  Puntos gastados: ${b.costoPuntos.toLocaleString("es-CO")}
                </span>

                <span class="historial-meta">
                  Dinero canjeado: $${b.dineroCanjeado.toLocaleString("es-CO")}
                </span>

                <span class="historial-meta">
                  Billetera destino:
                  ${b.billeteraDestino.nombre}
                </span>

              </div>

            </div>
          `;
        });

        renderPaginacion(beneficios.length);
      }
    }

    function renderPaginacion(total) {

      const cont = document.getElementById(
        "paginacion"
      );

      cont.innerHTML = "";

      const totalPaginas = Math.ceil(
        total / porPagina
      );

      if (totalPaginas <= 1) return;

      cont.innerHTML = `

        <button
          class="btn"
          onclick="cambiarPagina(-1)"
          ${paginaActual === 1 ? 'disabled' : ''}
        >
          ←
        </button>

        <span>
          Página ${paginaActual} de ${totalPaginas}
        </span>

        <button
          class="btn"
          onclick="cambiarPagina(1)"
          ${paginaActual === totalPaginas ? 'disabled' : ''}
        >
          →
        </button>
      `;
    }

    function cambiarPagina(dir) {

      paginaActual += dir;

      renderHistorial();
    }

    function actualizarDinero() {

      const puntos = parseInt(document.getElementById("puntos").value.replace(/\./g, ""));

      if (!puntos || puntos <= 0) {

        document.getElementById("dinero").value = "";

        return;
      }

      document.getElementById("dinero").value =
        "$" + (puntos * 5).toLocaleString("es-CO");
    }

    async function canjear() {

      const puntosInput =
        document.getElementById("puntos");

      const puntos =
        parseInt(puntosInput.value.replace(/\./g, ""));

      const billeteraId =
        document.getElementById("billeteraSelect").value;

      const errorMsg =
        document.getElementById("error-msg");

      if (!puntos || puntos <= 0) {

        errorMsg.textContent =
          "Los puntos deben ser mayores que 0";

        errorMsg.style.display = "block";

        puntosInput.classList.remove("input-error");

        void puntosInput.offsetWidth;

        puntosInput.classList.add("input-error");

        return;
      }

      if (puntos > usuario.puntos) {

        errorMsg.textContent =
          "No tienes suficientes puntos";

        errorMsg.style.display = "block";

        puntosInput.classList.remove("input-error");

        void puntosInput.offsetWidth;

        puntosInput.classList.add("input-error");

        return;
      }

      errorMsg.style.display = "none";

      puntosInput.classList.remove("input-error");

      try {

        const res = await fetch(
          `http://localhost:8080/beneficios/canjear/${usuario.cedula}/${billeteraId}/${puntos}`,
          {
            method: "POST"
          }
        );

        if (!res.ok) {

          mostrarPopup(
            "No se pudo realizar el canje"
          );

          return;
        }

        await actualizarUsuario();

        mostrarPopup(
          "Canje realizado correctamente"
        );

        document.getElementById("puntos").value = "";

        document.getElementById("dinero").value = "";

        await cargarBilleteras();
        await cargarHistorial();

      } catch {

        mostrarPopup(
          "Error al realizar el canje"
        );
      }
    }

    function mostrarPopup(mensaje) {

      document.getElementById(
        "popup-message"
      ).textContent = mensaje;

      document.getElementById(
        "popup"
      ).classList.remove("hidden");
    }

    function cerrarPopup() {

      document.getElementById(
        "popup"
      ).classList.add("hidden");
    }

    function logout() {

      sessionStorage.removeItem("usuario");
    }

    function formatearFecha(fechaISO) {

      const f = new Date(fechaISO);

      const dia = f.getDate();

      const mes = f.toLocaleString(
        "es-CO",
        { month: "long" }
      );

      const anio = f.getFullYear();

      let horas = f.getHours();

      const minutos = String(
        f.getMinutes()
      ).padStart(2, "0");

      const ampm =
        horas >= 12 ? "p.m." : "a.m.";

      horas = horas % 12 || 12;

      return `
        ${dia} de ${mes} ${anio},
        ${horas}:${minutos} ${ampm}
      `;
    }

    function formatearMiles(input) {
      let valor = input.value.replace(/\./g, "");
      valor = valor.replace(/[^0-9]/g, "");

      if (valor === "") {
        input.value = "";
        actualizarDinero();
        return;
      }

      input.value = Number(valor).toLocaleString("es-CO");

      actualizarDinero();
    }

    document.getElementById("puntos")
      .addEventListener("input", () => {

        actualizarDinero();

        const puntosInput =
          document.getElementById("puntos");

        const errorMsg =
          document.getElementById("error-msg");

        errorMsg.style.display = "none";

        errorMsg.textContent = "";

        puntosInput.classList.remove("input-error");
      });

    async function iniciarPagina() {

      await actualizarUsuario();

      await cargarBilleteras();

      await cargarHistorial();
    }

    iniciarPagina();

  </script>

</body>

</html>
