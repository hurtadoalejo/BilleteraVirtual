<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 25px;
      overflow-y: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .card h3 {
      font-size: 13px;
      color: #64748b;
    }

    .card p {
      font-size: 18px;
      font-weight: bold;
      color: #4d82bc;
      margin-top: 5px;
    }

    .section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .box {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      height: 280px;
    }


    .box h2 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #1e293b;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }

    .small {
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <nav class="sidebar">

    <div class="nav-group">
      <a href="/dashboard.html" class="nav-item"><img src="images/dashboard.svg"><span>Dashboard</span></a>
      <a href="/usuarios.html" class="nav-item"><img src="images/usuarios.svg"><span>Usuarios</span></a>
      <a href="/billeteras.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/transacciones.html" class="nav-item"><img src="images/transacciones.svg"><span>Transacciones</span></a>
      <a href="/relaciones.html" class="nav-item"><img src="images/relaciones.svg"><span>Relaciones</span></a>
      <a href="/alertas.html" class="nav-item"><img src="images/alertas.svg"><span>Alertas</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>

  </nav>

  <div class="content">

    <div class="grid">
      <div class="card">
        <h3>Total usuarios</h3>
        <p id="usuarios"></p>
      </div>

      <div class="card">
        <h3>Total billeteras</h3>
        <p id="billeteras"></p>
      </div>

      <div class="card">
        <h3>Total transacciones</h3>
        <p id="transacciones"></p>
      </div>

      <div class="card">
        <h3>Dinero movilizado</h3>
        <p id="dinero"></p>
      </div>
    </div>

    <div class="section">

      <div class="box">
        <h2>Top rutas usuarios</h2>
        <div id="topRutas"></div>
      </div>

      <div class="box">
        <h2>Top usuarios</h2>
        <div id="topUsuarios"></div>
      </div>

      <div class="box">
        <h2>Top transacciones</h2>
        <div id="topTransacciones"></div>
      </div>

      <div class="box">
        <h2>Top billeteras</h2>
        <div id="topBilleteras"></div>
      </div>

    </div>

  </div>

  <script>
    const formatoCOP = new Intl.NumberFormat("es-CO", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });

    function formatearFecha(fechaISO) {
      const fecha = new Date(fechaISO);

      return fecha.toLocaleString("es-CO", {
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    async function cargarDashboard() {

      const res = await fetch("http://localhost:8080/sistema/dashboard");
      const data = await res.json();

      document.getElementById("usuarios").innerText = data.totalUsuarios;
      document.getElementById("billeteras").innerText = data.totalBilleteras;
      document.getElementById("transacciones").innerText = data.totalTransacciones;
      document.getElementById("dinero").innerText = "$ " + formatoCOP.format(data.dineroMovilizado);

      document.getElementById("topRutas").innerHTML =
        data.topRutasUsuarios.map(r => {
          return `
            <div class="item">
              <b>Usuario: ${r.origen}</b><br>
              <span class="small">
                hacia Usuario: ${r.destino}
              </span><br>
              Cantidad de transferencias: ${r.cantidad}
            </div>
          `;
        }).join("");

      document.getElementById("topUsuarios").innerHTML = data.topUsuarios.map(u =>
        `<div class="item">
          <b>${u.nombreCompleto}</b><br>
          <span class="small">Cédula: ${u.cedula}</span><br>
          <span class="small">Nivel: ${u.nivel}</span><br>
          Puntos: ${u.puntos}
        </div>`
      ).join("");

      document.getElementById("topTransacciones").innerHTML =
        data.topTransacciones.map(t => {
          const valorFormateado = formatoCOP.format(Number(t.valor));
          return `
            <div class="item">
              <b>${t.tipo}</b><br>
              <span class="small">${formatearFecha(t.fecha)}</span><br>
              Valor: $ ${valorFormateado}
            </div>
          `;
        }).join("");

      document.getElementById("topBilleteras").innerHTML =
        data.topBilleteras.map(b => {
          return `
            <div class="item">
              <b>Billetera ID:</b> ${b.id}<br>
              <span class="small">Saldo: $ ${formatoCOP.format(b.getSaldo ? b.getSaldo() : b.saldo)}</span>
            </div>
          `;
        }).join("");
    }

    cargarDashboard();
    setInterval(() => {
      cargarDashboard();
    }, 5000);

  </script>

</body>

</html>
