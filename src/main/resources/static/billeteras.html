<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billeteras</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 35px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .estadisticas {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .stat h3 {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .stat p {
      font-size: 24px;
      font-weight: bold;
      color: #1e293b;
    }

    .busqueda {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
    }

    #lista {
      flex: 1;
      overflow-y: auto;
    }

    .billetera {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .billetera-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      flex: 1;
      font-size: 13px;
    }

    .label {
      color: #64748b;
      font-size: 11px;
      display: block;
      margin-bottom: 3px;
    }

    .value {
      font-weight: bold;
      color: #1e293b;
    }

    .categoria {
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
    }

    .AHORROS {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .GASTOS {
      background: #fee2e2;
      color: #b91c1c;
    }

    .INVERSION {
      background: #dcfce7;
      color: #15803d;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
    }

    .paginacion {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding-top: 15px;
    }

    .lista-animada {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    .lista-animada.fade {
      opacity: 0;
      transform: translateY(10px);
    }
  </style>
</head>

<body>

  <nav class="sidebar">

    <div class="nav-group">
      <a href="/dashboard.html" class="nav-item"><img src="images/dashboard.svg"><span>Dashboard</span></a>
      <a href="/usuarios.html" class="nav-item"><img src="images/usuarios.svg"><span>Usuarios</span></a>
      <a href="/billeteras.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/transacciones.html" class="nav-item"><img src="images/transacciones.svg"><span>Transacciones</span></a>
      <a href="/relaciones.html" class="nav-item"><img src="images/relaciones.svg"><span>Relaciones</span></a>
      <a href="/alertas.html" class="nav-item"><img src="images/alertas.svg"><span>Alertas</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>

  </nav>

  <div class="content">

    <div class="container">

      <h1 class="titulo">
        Billeteras registradas
      </h1>

      <div class="estadisticas">

        <div class="stat">
          <h3>Billetera con mayor uso</h3>
          <p id="mayorUso">-</p>
        </div>

        <div class="stat">
          <h3>Categoría más activa</h3>
          <p id="categoriaActiva">-</p>
        </div>

        <div class="stat">
          <h3>Total billeteras</h3>
          <p id="totalBilleteras">0</p>
        </div>

      </div>

      <div class="card">
        <input type="text" id="buscarBilletera" class="busqueda" placeholder="Buscar por ID o dueño...">
      </div>

      <div id="lista"></div>

      <div id="paginacion" class="paginacion"></div>

    </div>

  </div>

  <script>
    /**
     * Lista global que almacena todas las billeteras obtenidas del servidor.
     * @type {Array<Object>}
     */
    let billeteras = [];

    /**
     * Índice de la página que se está visualizando actualmente en la interfaz.
     * @type {number}
     */
    let paginaActual = 1;

    /**
     * Cantidad máxima de registros de billeteras que se muestran por cada página.
     * @type {number}
     */
    const porPagina = 4;

    /**
     * Formateador de números configurado para la moneda Pesos Colombianos (COP).
     * @type {Intl.NumberFormat}
     */
    const formatoCOP = new Intl.NumberFormat("es-CO");

    /**
     * Solicita de forma asíncrona la lista de billeteras al backend, 
     * las ordena por cantidad de movimientos de forma descendente y actualiza la interfaz.
     * @async
     * @function cargarBilleteras
     * @returns {Promise<void>}
     */
    async function cargarBilleteras() {
      const res = await fetch(
        "http://localhost:8080/billeteras/admin"
      );
      billeteras = await res.json();
      billeteras.sort((a, b) =>
        b.movimientos - a.movimientos
      );

      document.getElementById("totalBilleteras")
        .textContent =
        billeteras.length;

      calcularEstadisticas();
      render(true);
    }

    /**
     * Analiza el arreglo de billeteras para determinar cuál tiene mayor número de movimientos 
     * y cuál es la categoría (tipo) con más actividad acumulada, reflejando los resultados en el DOM.
     * @function calcularEstadisticas
     * @returns {void}
     */
    function calcularEstadisticas() {
      if (billeteras.length === 0) {
        document.getElementById("mayorUso")
          .textContent = "-";
        document.getElementById("categoriaActiva")
          .textContent = "-";
        return;
      }

      let mayor = billeteras[0];

      for (const billetera of billeteras) {
        if (billetera.movimientos > mayor.movimientos) {
          mayor = billetera;
        }
      }

      document.getElementById("mayorUso")
        .textContent =
        mayor.id;

      const categorias = {};

      for (const billetera of billeteras) {
        const tipo = billetera.tipo;
        categorias[tipo] =
          (categorias[tipo] || 0) +
          billetera.movimientos;
      }

      let categoriaMasActiva = "-";
      let max = -1;

      for (const categoria in categorias) {
        if (categorias[categoria] > max) {
          max = categorias[categoria];
          categoriaMasActiva = categoria;
        }
      }

      document.getElementById("categoriaActiva")
        .textContent =
        categoriaMasActiva;
    }

    /**
     * Filtra el arreglo global de billeteras basándose en el texto ingresado en el buscador.
     * Evalúa coincidencias parciales (insensible a mayúsculas/minúsculas) en el ID, nombre del dueño o cédula.
     * @function obtenerFiltradas
     * @returns {Array<Object>} Lista de billeteras que cumplen con el criterio de búsqueda.
     */
    function obtenerFiltradas() {
      const texto =
        document.getElementById("buscarBilletera")
          .value
          .trim()
          .toLowerCase();

      return billeteras.filter(b =>
        b.id.toLowerCase().includes(texto) ||
        b.usuarioNombre.toLowerCase().includes(texto) ||
        b.usuarioId.toLowerCase().includes(texto)
      );
    }

    /**
     * Coordina el proceso de renderizado de la lista de billeteras en el DOM.
     * Aplica un efecto visual de transición ("fade") a menos que se indique lo contrario.
     * @function render
     * @param {boolean} [sinAnimacion=false] - Si es verdadero, dibuja la lista inmediatamente omitiendo el delay de animación.
     * @returns {void}
     */
    function render(sinAnimacion = false) {
      const lista = document.getElementById("lista");

      if (!sinAnimacion) {
        lista.classList.add("fade");
        setTimeout(() => dibujar(), 200);
      } else {
        dibujar();
      }

      /**
       * Procesa la paginación, limpia el contenedor e inyecta el código HTML 
       * correspondiente a los elementos de la página actual.
       * @function dibujar
       * @inner
       * @returns {void}
       */
      function dibujar() {
        lista.classList.remove("fade");
        lista.classList.add("lista-animada");

        const filtradas = obtenerFiltradas();
        const inicio = (paginaActual - 1) * porPagina;
        const fin = inicio + porPagina;
        const pagina = filtradas.slice(inicio, fin);

        lista.innerHTML = "";

        pagina.forEach(b => {
          lista.innerHTML += `
          <div class="billetera">
            <div class="billetera-info">
              <div>
                <span class="label">ID</span>
                <span class="value">${b.id}</span>
              </div>
              <div>
                <span class="label">Nombre</span>
                <span class="value">${b.nombre}</span>
              </div>
              <div>
                <span class="label">Dueño</span>
                <span class="value">${b.usuarioNombre}</span>
              </div>
              <div>
                <span class="label">Cédula</span>
                <span class="value">${b.usuarioId}</span>
              </div>
              <div>
                <span class="label">Saldo</span>
                <span class="value">$ ${formatoCOP.format(b.saldo)}</span>
              </div>
              <div>
                <span class="label">Categoría</span>
                <span class="categoria ${b.tipo}">${b.tipo}</span>
              </div>
              <div>
                <span class="label">Movimientos</span>
                <span class="value">${b.movimientos}</span>
              </div>
              <div>
                <span class="label">Estado</span>
                <span class="value">${b.estado}</span>
              </div>
            </div>
          </div>
        `;
        });

        renderPaginacion(filtradas.length);
      }
    }

    /**
     * Genera e inyecta los controles de navegación (botones adelante/atrás e indicador) 
     * en el DOM basándose en la cantidad total de elementos filtrados.
     * @function renderPaginacion
     * @param {number} total - Cantidad total de elementos resultantes del filtro actual.
     * @returns {void}
     */
    function renderPaginacion(total) {
      const cont = document.getElementById("paginacion");
      cont.innerHTML = "";

      const totalPaginas = Math.ceil(total / porPagina);

      if (totalPaginas <= 1) return;

      cont.innerHTML = `
      <button
        class="btn"
        onclick="cambiarPagina(-1)"
        ${paginaActual === 1 ? 'disabled' : ''}
      >
        ←
      </button>
      <span style="align-self:center;">
        Página ${paginaActual} de ${totalPaginas}
      </span>
      <button
        class="btn"
        onclick="cambiarPagina(1)"
        ${paginaActual === totalPaginas ? 'disabled' : ''}
      >
        →
      </button>
    `;
    }

    /**
     * Cambia la página actual incrementando o decrementando su valor según la dirección provista
     * y ejecuta el renderizado de la nueva vista.
     * @function cambiarPagina
     * @param {number} dir - Dirección del cambio (típicamente 1 para avanzar o -1 para retroceder).
     * @returns {void}
     */
    function cambiarPagina(dir) {
      paginaActual += dir;
      render();
    }

    /**
     * Escuchador de eventos para la entrada de texto en el buscador. 
     * Reinicia el control de paginación a la primera página y vuelve a renderizar los datos coincidentes.
     * @event InputEvent
     * @listener
     */
    document.getElementById("buscarBilletera")
      .addEventListener("input", () => {
        paginaActual = 1;
        render();
      });

    /**
     * Remueve la información del usuario almacenada en el almacenamiento de sesión para cerrar la sesión actual.
     * @function logout
     * @returns {void}
     */
    function logout() {
      sessionStorage.removeItem("usuario");
    }

    // Inicializa la carga de datos al abrir o refrescar la pantalla.
    cargarBilleteras();

    /**
     * Temporizador cíclico que actualiza de manera automática la lista de billeteras en segundo plano cada 5 segundos.
     * @type {number}
     */
    setInterval(() => {
      cargarBilleteras();
    }, 5000);
</script>

</body>

</html>
