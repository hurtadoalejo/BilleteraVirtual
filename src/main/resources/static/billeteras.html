<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billeteras</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 35px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .estadisticas {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .stat h3 {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .stat p {
      font-size: 24px;
      font-weight: bold;
      color: #1e293b;
    }

    .busqueda {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
    }

    #lista {
      flex: 1;
      overflow-y: auto;
    }

    .billetera {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .billetera-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      flex: 1;
      font-size: 13px;
    }

    .label {
      color: #64748b;
      font-size: 11px;
      display: block;
      margin-bottom: 3px;
    }

    .value {
      font-weight: bold;
      color: #1e293b;
    }

    .categoria {
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
    }

    .AHORROS {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .GASTOS {
      background: #fee2e2;
      color: #b91c1c;
    }

    .INVERSION {
      background: #dcfce7;
      color: #15803d;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
    }

    .paginacion {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding-top: 15px;
    }

    .lista-animada {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    .lista-animada.fade {
      opacity: 0;
      transform: translateY(10px);
    }
  </style>
</head>

<body>

  <nav class="sidebar">

    <div class="nav-group">
      <a href="/dashboard.html" class="nav-item"><img src="images/dashboard.svg"><span>Dashboard</span></a>
      <a href="/usuarios.html" class="nav-item"><img src="images/usuarios.svg"><span>Usuarios</span></a>
      <a href="/billeteras.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/transacciones.html" class="nav-item"><img src="images/transacciones.svg"><span>Transacciones</span></a>
      <a href="/relaciones.html" class="nav-item"><img src="images/relaciones.svg"><span>Relaciones</span></a>
      <a href="/alertas.html" class="nav-item"><img src="images/alertas.svg"><span>Alertas</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>

  </nav>

  <div class="content">

    <div class="container">

      <h1 class="titulo">
        Billeteras registradas
      </h1>

      <div class="estadisticas">

        <div class="stat">
          <h3>Billetera con mayor uso</h3>
          <p id="mayorUso">-</p>
        </div>

        <div class="stat">
          <h3>Categoría más activa</h3>
          <p id="categoriaActiva">-</p>
        </div>

        <div class="stat">
          <h3>Total billeteras</h3>
          <p id="totalBilleteras">0</p>
        </div>

      </div>

      <div class="card">
        <input type="text" id="buscarBilletera" class="busqueda" placeholder="Buscar por ID o dueño...">
      </div>

      <div id="lista"></div>

      <div id="paginacion" class="paginacion"></div>

    </div>

  </div>

  <script>
    /** * @type {Array<Object>} Lista global de alertas de fraude obtenidas del backend.
     */
    let alertas = [];

    /** * @type {number} Índice de la página actual en la paginación.
     */
    let paginaActual = 1;

    /** * @type {number} Cantidad máxima de registros visibles por página.
     */
    const porPagina = 7;

    /** * @type {Intl.NumberFormat} Formateador de moneda para Pesos Colombianos (COP) sin decimales.
     */
    const formatoCOP = new Intl.NumberFormat("es-CO", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });

    /**
     * Convierte una fecha ISO en un texto amigable con formato colombiano.
     * @param {string} fechaISO - Fecha en formato estándar (ej: "2026-05-25T11:00:00Z").
     * @returns {string} Fecha formateada (ej: "25 de may de 2026, 11:00 AM").
     */
    function formatearFecha(fechaISO) {
      const fecha = new Date(fechaISO);
      return fecha.toLocaleString("es-CO", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    /**
     * Consulta las alertas de fraude desde el servidor API y recarga la interfaz.
     * @returns {Promise<void>}
     */
    async function cargarDatos() {
      const response = await fetch(
        "http://localhost:8080/fraude"
      );
      alertas = await response.json();
      renderTabla();
    }

    /**
     * Filtra la lista global de alertas según los criterios seleccionados en el HTML.
     * @returns {Array<Object>} Lista de alertas que cumplen con los filtros de tipo, riesgo y fechas.
     */
    function obtenerFiltradas() {
      const tipo = document.getElementById("filtroTipo").value;
      const riesgo = document.getElementById("filtroRiesgo").value;
      const fechaInicio = document.getElementById("fechaInicio").value;
      const fechaFin = document.getElementById("fechaFin").value;

      return alertas.filter(t => {
        const coincideTipo = !tipo || t.tipo === tipo;
        const coincideRiesgo = !riesgo || t.nivelRiesgo === riesgo;
        const fechaTransaccion = new Date(t.fecha);

        let coincideInicio = true;
        let coincideFin = true;

        if (fechaInicio) {
          coincideInicio = fechaTransaccion >= new Date(fechaInicio);
        }

        if (fechaFin) {
          const fin = new Date(fechaFin);
          fin.setHours(23, 59, 59, 999); // Incluye todo el día final
          coincideFin = fechaTransaccion <= fin;
        }

        return coincideTipo && coincideRiesgo && coincideInicio && coincideFin;
      });
    }

    /**
     * Restablece todos los inputs de filtro a sus valores vacíos y reinicia la tabla.
     * @returns {void}
     */
    function limpiarFiltros() {
      document.getElementById("fechaInicio").value = "";
      document.getElementById("fechaFin").value = "";
      document.getElementById("filtroTipo").value = "";
      document.getElementById("filtroRiesgo").value = "";
      paginaActual = 1;
      renderTabla();
    }

    /**
     * Ordena, pagina y dibuja las alertas filtradas en la tabla HTML con un efecto visual de transición.
     * @returns {void}
     */
    function renderTabla() {
      const tabla = document.getElementById("tablaAlertas");
      tabla.classList.add("out"); // Inicia animación de salida

      setTimeout(() => {
        const filtradas = obtenerFiltradas();

        // Ordenar de la más reciente a la más antigua
        filtradas.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

        // Segmentar los registros por página (Paginación)
        const inicio = (paginaActual - 1) * porPagina;
        const fin = inicio + porPagina;
        const pagina = filtradas.slice(inicio, fin);

        tabla.innerHTML = "";

        pagina.forEach(t => {
          tabla.innerHTML += `
          <tr>
            <td><span class="badge ${t.tipo}">${t.tipo}</span></td>
            <td><span class="badge ${t.nivelRiesgo}">${t.nivelRiesgo}</span></td>
            <td>$ ${formatoCOP.format(t.valor)}</td>
            <td>${t.billeteraOrigenId || "-"}</td>
            <td>${t.billeteraDestinoId || "-"}</td>
            <td>${formatearFecha(t.fecha)}</td>
            <td>
              <div class="alertas-lista">
                ${(t.alertasFraude || []).map(alerta => `
                  <div class="alerta-item">${alerta}</div>
                `).join("")}
              </div>
            </td>
          </tr>
          `;
        });

        renderPaginacion(filtradas.length);
        tabla.classList.remove("out"); // Inicia animación de entrada
      }, 150);
    }

    /**
     * Actualiza el estado de los botones de navegación y el texto indicador de páginas.
     * @param {number} total - El total de registros que pasaron los filtros actuales.
     * @returns {void}
     */
    function renderPaginacion(total) {
      const totalPaginas = Math.ceil(total / porPagina);

      document.getElementById("paginaTexto").textContent =
        `Página ${paginaActual} de ${totalPaginas || 1}`;

      document.getElementById("btnAnterior").disabled = paginaActual === 1;
      document.getElementById("btnSiguiente").disabled = paginaActual >= totalPaginas;
    }

    /**
     * Incrementa o decrementa la página actual y refresca la tabla si el movimiento es válido.
     * @param {number} direccion - Utilizar `1` para avanzar página o `-1` para retroceder.
     * @returns {void}
     */
    function cambiarPagina(direccion) {
      const total = obtenerFiltradas().length;
      const totalPaginas = Math.ceil(total / porPagina) || 1;
      const nuevaPagina = paginaActual + direccion;

      if (nuevaPagina < 1 || nuevaPagina > totalPaginas) return;

      paginaActual = nuevaPagina;
      renderTabla();
    }

    const inputInicio = document.getElementById("fechaInicio");
    const inputFin = document.getElementById("fechaFin");

    /** Listener: Controla las restricciones y coherencia al cambiar la fecha de inicio */
    inputInicio.addEventListener("change", () => {
      if (inputInicio.value) {
        inputFin.min = inputInicio.value;
      } else {
        inputFin.min = "";
      }

      if (inputFin.value && inputFin.value < inputInicio.value) {
        inputFin.value = inputInicio.value;
      }
      paginaActual = 1;
      renderTabla();
    });

    /** Listener: Controla las restricciones y coherencia al cambiar la fecha de fin */
    inputFin.addEventListener("change", () => {
      if (inputFin.value) {
        inputInicio.max = inputFin.value;
      } else {
        inputInicio.max = "";
      }

      if (inputInicio.value && inputInicio.value > inputFin.value) {
        inputInicio.value = inputFin.value;
      }
      paginaActual = 1;
      renderTabla();
    });

    /** Listener: Reinicia la paginación y filtra cuando cambia el selector de tipo */
    document.getElementById("filtroTipo").addEventListener("change", () => {
      paginaActual = 1;
      renderTabla();
    });

    /** Listener: Reinicia la paginación y filtra cuando cambia el selector de riesgo */
    document.getElementById("filtroRiesgo").addEventListener("change", () => {
      paginaActual = 1;
      renderTabla();
    });

    // Carga inicial al abrir la página
    cargarDatos();

    document.getElementById("tablaAlertas").classList.add("fade-table");

    /**
     * @type {number} Temporizador en bucle para auto-refrescar los datos cada 5 segundos.
     */
    setInterval(() => {
      cargarDatos();
    }, 5000);

</script>

</body>

</html>
