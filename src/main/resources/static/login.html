<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
    rel="stylesheet">

  <title>Iniciar Sesión</title>

  <style>
    :root {
      --error-color: #ff9b9b;
    }

    * {
      user-select: none;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --card-width: 500px;
      --input-bg: rgba(255, 255, 255, 0.2);
      --button-bg: rgba(255, 255, 255, 0.3);
      --accent-color: #4d82bc;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-card {
      background-color: rgba(7, 68, 109, 0.2);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: var(--card-width);
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    .form-title {
      font-size: 30px;
      font-family: 'Google Sans', sans-serif;
      color: rgb(219, 219, 219);
      pointer-events: none;
    }

    .input-container {
      width: 100%;
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-radius: 40px;
      background-color: var(--input-bg);
      backdrop-filter: blur(10px);
    }

    .input-container img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      opacity: 0.6;
      pointer-events: none;
    }

    .form-input {
      flex: 1;
      min-width: 0;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
      padding-left: 12px;
      font-family: 'Inter', sans-serif;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .register-link-container {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      padding-left: 10px;
      color: white;
      font-size: 14px;
      opacity: 0.8;
    }

    .register-link-container a {
      color: white;
      padding-left: 5px;
      text-decoration: underline;
      transition: opacity 0.2s ease;
      opacity: 0.8;
    }

    .register-link-container a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .btn-submit {
      width: 200px;
      height: 50px;
      border-radius: 40px;
      border: none;
      background-color: var(--button-bg);
      color: white;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.2s;
    }

    .btn-submit:hover {
      background-color: rgba(255, 255, 255, 0.4);
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    #error-msg {
      color: var(--error-color);
      font-size: 14px;
      display: none;
      text-align: center;
    }

    .input-error {
      animation: shake 0.3s;
      border: 2px solid var(--error-color);
    }

    .toggle-eye {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 10px;
    }

    .toggle-eye svg {
      width: 22px;
      height: 22px;
      fill: white;
      opacity: 0.7;
    }

    .eye-closed {
      display: none;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <form class="login-form" id="loginForm">
      <h1 class="form-title">Iniciar Sesión</h1>

      <div class="input-container">
        <img src="1.png" alt="usuario">
        <input type="text" id="cedula" class="form-input" placeholder="Cédula" required>
      </div>

      <div class="input-container">
        <img src="2.png" alt="contraseña">
        <input type="password" id="password" class="form-input" placeholder="Contraseña" required>
        <span class="toggle-eye" onclick="togglePassword('password', this)">
          <svg class="eye-open" viewBox="0 0 24 24">
            <path
              d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
          </svg>
          <svg class="eye-closed" viewBox="0 0 24 24">
            <path
              d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
          </svg>
        </span>
      </div>

      <div id="error-msg">Cédula o contraseña incorrecta</div>

      <div class="register-link-container">
        ¿No tienes cuenta? <a href="/register.html">Crea una aquí</a>
      </div>

      <button type="submit" class="btn-submit">Iniciar Sesión</button>
    </form>
  </div>

  <script>
    function reiniciarErrorAnimacion(element) {
      element.classList.remove("input-error");

      void element.offsetWidth;

      element.classList.add("input-error");
    }

    const form = document.getElementById("loginForm");
    const cedulaInput = document.getElementById("cedula");
    const passwordInput = document.getElementById("password");
    const errorMsg = document.getElementById("error-msg");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const usuario = {
        cedula: cedulaInput.value,
        password: passwordInput.value
      };

      fetch("http://localhost:8080/usuarios/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(usuario)
      })
        .then(async response => {
          const text = await response.text();

          if (!response.ok) {
            throw new Error(text);
          }

          return JSON.parse(text);
        })
        .then(data => {
          sessionStorage.setItem("usuario", JSON.stringify(data));
          window.location.href = "/home.html";
        })
        .catch(error => {
          errorMsg.style.display = "block";
          reiniciarErrorAnimacion(cedulaInput.parentElement);
          reiniciarErrorAnimacion(passwordInput.parentElement);
          console.error(error.message);
        });
    });

    function togglePassword(inputId, element) {
      const input = document.getElementById(inputId);
      const eyeOpen = element.querySelector(".eye-open");
      const eyeClosed = element.querySelector(".eye-closed");

      if (input.type === "password") {
        input.type = "text";
        eyeOpen.style.display = "none";
        eyeClosed.style.display = "block";
      } else {
        input.type = "password";
        eyeOpen.style.display = "block";
        eyeClosed.style.display = "none";
      }
    }

    window.onload = function () {
      document.getElementById("cedula").value = "";
      document.getElementById("password").value = "";
    };

    function limpiarError() {
      errorMsg.style.display = "none";

      cedulaInput.parentElement.classList.remove("input-error");
      passwordInput.parentElement.classList.remove("input-error");
    }

    cedulaInput.addEventListener("input", limpiarError);
    passwordInput.addEventListener("input", limpiarError);
  </script>
</body>

</html>
