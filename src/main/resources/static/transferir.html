<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transferir</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 40px;
      overflow-y: auto;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .nota {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      gap: 15px;
    }

    .form-row label {
      width: 40%;
      font-size: 14px;
      color: #64748b;
    }

    .form-row select,
    .form-row input {
      width: 60%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
      display: block;
      margin-left: auto;
    }

    .input-error {
      animation: shake 0.3s;
      border: 2px solid #ff9b9b !important;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    .input-group {
      width: 60%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    #error-msg {
      color: #ff6b6b;
      font-size: 13px;
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      width: 100%;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background: rgba(77, 130, 188, 0.85);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .popup-content p {
      margin-bottom: 20px;
    }

    .popup-content button {
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      cursor: pointer;
    }

    .popup-content button:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .hidden {
      display: none;
    }

    input[readonly] {
      background: #f1f5f9;
      color: #64748b;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <nav class="sidebar">
    <div class="nav-group">
      <a href="/home.html" class="nav-item"><img src="images/home.svg"><span>Inicio</span></a>
      <a href="/billetera.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/recargar.html" class="nav-item"><img src="images/recargar.svg"><span>Recargar</span></a>
      <a href="/retirar.html" class="nav-item"><img src="images/retirar.svg"><span>Retirar</span></a>
      <a href="/transferir.html" class="nav-item"><img src="images/transferir.svg"><span>Transferir</span></a>
      <a href="/programar.html" class="nav-item"><img src="images/programar.svg"><span>Programar</span></a>
      <a href="/historial.html" class="nav-item"><img src="images/historial.svg"><span>Historial</span></a>
      <a href="/canjear.html" class="nav-item"><img src="images/canjear.svg"><span>Canjear</span></a>
      <a href="/soporte.html" class="nav-item"><img src="images/support.svg"><span>Soporte</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>
  </nav>

  <div class="content">
    <div class="container">

      <h1 class="titulo">Transferir dinero</h1>
      <div class="nota" id="notaComision"></div>

      <div class="card">

        <div class="form-row">
          <label>Selecciona la billetera</label>
          <select id="billeteraSelect"></select>
        </div>

        <div class="form-row">
          <label>Número de billetera destino</label>
          <input type="text" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" id="destino">
        </div>

        <div class="form-row">
          <label>¿Cuánto dinero transferirá?</label>
          <div class="input-group">
            <input type="text" inputmode="numeric" oninput="formatearMiles(this)" id="valor">
            <div id="error-msg"></div>
          </div>
        </div>

        <div class="form-row">
          <label>Total a descontar</label>
          <input type="text" id="total" readonly>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
          <button class="btn" onclick="transferir()" style="margin:0;">
            Transferir
          </button>
          <button class="btn" onclick="mostrarConfirmacionCancelacion()" style="margin:0; background:#e94040;">
            Cancelar última transferencia
          </button>
        </div>


      </div>

    </div>
  </div>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <p id="popup-message"></p>

      <div style="display:flex; gap:10px; justify-content:center;">
        <button id="btnAceptar" onclick="cerrarPopup()">
          Aceptar
        </button>
      </div>
    </div>
  </div>

  <div id="popupCancelar" class="popup hidden">
    <div class="popup-content">
      <p>¿Seguro que quieres cancelar la última transferencia?</p>

      <div style="display:flex; gap:10px; justify-content:center;">
        <button onclick="confirmarCancelacion()">
          Sí
        </button>

        <button onclick="cerrarPopupCancelacion()">
          No
        </button>
      </div>
    </div>
  </div>

  <script>
    /**
     * Datos del usuario autenticado obtenidos desde la sesión.
     * @type {Object|null}
     */
    let usuario = JSON.parse(sessionStorage.getItem("usuario"));

    /**
     * Guarda temporalmente la nueva categoría o escalafón alcanzado tras una operación para notificarlo de manera diferida.
     * @type {string|null}
     */
    let nivelPendiente = null;

    /**
     * Identificador de la temporización asignada para controlar el margen de tiempo permitido para deshacer la transacción.
     * @type {number|null}
     */
    let timeoutReversion = null;

    if (!usuario) {
      window.location.href = "/login.html";
    }

    /**
     * Arreglo global con la lista de billeteras del usuario para validar la disponibilidad local de fondos.
     * @type {Array<Object>}
     */
    let billeteras = [];

    /**
     * Analiza el rango de beneficios del usuario activo y devuelve la representación textual del porcentaje de recargo aplicable.
     * @returns {string} Texto con el porcentaje correspondiente (e.g., "0.4%", "0.3%").
     */
    function obtenerComision() {
      switch (usuario.nivel) {
        case "PLATA": return "0.4%";
        case "ORO": return "0.3%";
        case "PLATINO": return "0.1%";
        default: return "0.5%";
      }
    }

    document.getElementById("notaComision").textContent =
      "Nota: Comisión por transferencia a otra persona será de " + obtenerComision();

    /**
     * Consume el servicio web para obtener las billeteras asociadas al usuario e inyecta dinámicamente las opciones dentro del selector del DOM.
     * @returns {Promise<void>}
     */
    async function cargarBilleteras() {
      const res = await fetch(`http://localhost:8080/billeteras/${usuario.cedula}`);
      const data = await res.json();

      billeteras = data;

      const select = document.getElementById("billeteraSelect");
      select.innerHTML = "";

      data.forEach(b => {
        select.innerHTML += `<option value="${b.id}">${b.nombre}</option>`;
      });
    }

    /**
     * Modifica las clases del contenedor modal de cancelación para hacerlo visible en la interfaz gráfica.
     * @returns {void}
     */
    function mostrarConfirmacionCancelacion() {
      document.getElementById("popupCancelar")
        .classList.remove("hidden");
    }

    /**
     * Modifica las clases del contenedor modal de cancelación para ocultarlo de la vista del usuario.
     * @returns {void}
     */
    function cerrarPopupCancelacion() {
      document.getElementById("popupCancelar")
        .classList.add("hidden");
    }

    /**
     * Remueve el popup de advertencia e inicia de forma asíncrona la petición de anulación de la transferencia del usuario.
     * @returns {Promise<void>}
     */
    async function confirmarCancelacion() {
      cerrarPopupCancelacion();
      await cancelarUltimaTransferencia();
    }

    /**
     * Evalúa las restricciones del monto, la equivalencia de cuentas y los topes de saldo más comisiones para tramitar asíncronamente el envío de dinero hacia un tercero o cuenta propia.
     * @returns {Promise<void>}
     */
    async function transferir() {
      const valorInput = document.getElementById("valor");
      const valor = parseFloat(valorInput.value.replace(/\./g, ""));
      const origenId = document.getElementById("billeteraSelect").value;
      const destinoId = document.getElementById("destino").value;
      const errorMsg = document.getElementById("error-msg");

      const billetera = billeteras.find(b => b.id === origenId);

      if (!valor || valor <= 0) {
        errorMsg.textContent = "El valor debe ser mayor que 0";
        errorMsg.style.display = "block";
        valorInput.classList.remove("input-error");
        void valorInput.offsetWidth;
        valorInput.classList.add("input-error");
        return;
      }

      const comision = calcularComision(valor);
      const total = valor + comision;

      if (total > billetera.saldo) {
        errorMsg.textContent = "No hay suficiente saldo disponible";
        errorMsg.style.display = "block";
        valorInput.classList.remove("input-error");
        void valorInput.offsetWidth;
        valorInput.classList.add("input-error");
        return;
      }

      if (origenId === destinoId) {
        mostrarPopup("No puedes transferir a la misma billetera");
        return;
      }

      errorMsg.style.display = "none";
      valorInput.classList.remove("input-error");

      try {
        const res = await fetch(
          `http://localhost:8080/transacciones/transferir/${usuario.cedula}?origen=${origenId}&destino=${destinoId}&valor=${valor}`,
          { method: "POST" }
        );

        if (!res.ok) {
          const mensaje = await res.text();
          mostrarPopup(mensaje);
          return;
        }

        const data = await res.json();
        mostrarPopup("Transferencia realizada correctamente");

        if (data.subioNivel) {
          nivelPendiente = data.nuevoNivel;
        }

        if (res.ok) {
          const resUser = await fetch(`http://localhost:8080/usuarios/${usuario.cedula}`);
          const usuarioActualizado = await resUser.json();

          sessionStorage.setItem("usuario", JSON.stringify(usuarioActualizado));

          usuario = usuarioActualizado;

          document.getElementById("notaComision").textContent =
            "Nota: Comisión por transferencia a otra persona será de " + obtenerComision();

          actualizarTotal();

          document.getElementById("valor").value = "";
          document.getElementById("destino").value = "";
          document.getElementById("total").value = "";

          cargarBilleteras();
        }

      } catch (error) {
        mostrarPopup(error);
      }
    }

    /**
     * Cambia las propiedades visuales de la ventana informativa e inyecta la alerta o texto recibido.
     * @param {string} mensaje - El texto informativo que se expondrá en el popup.
     * @returns {void}
     */
    function mostrarPopup(mensaje) {
      document.getElementById("popup-message").textContent = mensaje;
      document.getElementById("popup").classList.remove("hidden");
    }

    /**
     * Envía una orden asíncrona al servidor para contrarrestar los efectos económicos de la última transacción efectuada y sincroniza los balances informativos en el cliente.
     * @returns {Promise<void>}
     */
    async function cancelarUltimaTransferencia() {
      try {
        const res = await fetch(
          `http://localhost:8080/transacciones/revertir/${usuario.cedula}`,
          {
            method: "POST"
          }
        );

        const mensaje = await res.text();

        mostrarPopup(mensaje);

        if (!res.ok) {
          return;
        }

        await actualizarUsuario();
        await cargarBilleteras();

        document.getElementById("valor").value = "";
        document.getElementById("destino").value = "";
        document.getElementById("total").value = "";

      } catch (e) {
        mostrarPopup("Error al cancelar la transferencia");
      }
    }

    /**
     * Oculta el popup modal general y comprueba de forma encadenada si existe una notificación de ascenso de categoría pendiente para desplegarla.
     * @returns {void}
     */
    function cerrarPopup() {
      document.getElementById("popup").classList.add("hidden");

      if (nivelPendiente) {
        setTimeout(() => {
          mostrarPopup("¡Felicidades! Has ascendido al nivel " + nivelPendiente);
          nivelPendiente = null;
        }, 300);
      }
    }

    /**
     * Destruye el registro de credenciales del usuario de la sesión para desautenticar la navegación.
     * @returns {void}
     */
    function logout() {
      sessionStorage.removeItem("usuario");
    }

    /**
     * Deduce el valor absoluto del cobro de comisión multiplicando el monto base por la tasa fraccionaria asignada al escalafón del usuario.
     * @param {number} valor - Importe monetario base de la transferencia.
     * @returns {number} Monto final de la comisión redondeado numéricamente.
     */
    function calcularComision(valor) {
      let porcentaje = 0.005;

      switch (usuario.nivel) {
        case "PLATA": porcentaje = 0.004; break;
        case "ORO": porcentaje = 0.003; break;
        case "PLATINO": porcentaje = 0.001; break;
      }

      return Math.round(valor * porcentaje);
    }

    /**
     * Examina si el identificador de destino de la operación concuerda con alguna de las billeteras que le pertenecen al usuario autenticado.
     * @param {string} destinoId - Identificador único de la billetera destino.
     * @returns {boolean} Verdadero si la cuenta destino es del mismo propietario; falso en caso contrario.
     */
    function esBilleteraPropia(destinoId) {
      return billeteras.some(b => String(b.id) === String(destinoId));
    }

    /**
     * Calcula la sumatoria del valor de transferencia sumado a los recargos por comisión (si la cuenta es de un tercero) e inyecta el valor total formateado en el DOM.
     * @returns {void}
     */
    function actualizarTotal() {
      const valorInput = document.getElementById("valor");
      const totalInput = document.getElementById("total");
      const errorMsg = document.getElementById("error-msg");

      const valor = parseFloat(valorInput.value.replace(/\./g, ""));
      const destinoId = document.getElementById("destino").value;

      errorMsg.style.display = "none";
      errorMsg.textContent = "";
      valorInput.classList.remove("input-error");

      if (!valor || valor <= 0) {
        totalInput.value = "";
        return;
      }

      let total = valor;

      if (!esBilleteraPropia(destinoId)) {
        const comision = calcularComision(valor);
        total += comision;
      }

      totalInput.value =
        Math.round(total).toLocaleString("es-CO");
    }

    /**
     * Limpia los caracteres no numéricos del input y renderiza los separadores de miles estándar regionales (Colombia) antes de recalcular los totales.
     * @param {HTMLElement} input - Elemento input de tipo texto del DOM.
     * @returns {void}
     */
    function formatearMiles(input) {

      let valor = input.value.replace(/\./g, "");
      valor = valor.replace(/[^0-9]/g, "");

      if (valor === "") {
        input.value = "";
        actualizarTotal();
        return;
      }

      input.value = Number(valor).toLocaleString("es-CO");

      actualizarTotal();
    }

    /**
     * Invoca de forma asíncrona la reversión total e inmediata de los flujos de dinero de la última operación registrada y gestiona las alertas correspondientes.
     * @returns {Promise<void>}
     */
    async function revertirUltimaTransferencia() {
      try {
        const res = await fetch(
          `http://localhost:8080/transacciones/revertir/${usuario.cedula}`,
          {
            method: "POST"
          }
        );

        const mensaje = await res.text();

        if (!res.ok) {
          mostrarPopup(mensaje);
          return;
        }

        nivelPendiente = null;
        mostrarPopup(mensaje);

        document.getElementById("btnDeshacer").classList.add("hidden");

        await cargarBilleteras();

      } catch {

        mostrarPopup("Error al revertir transferencia");
      }
    }

    /**
     * Consulta asíncronamente el estado de la cuenta del usuario en el origen de datos para refrescar la categoría y las comisiones en la sesión.
     * @returns {Promise<void>}
     */
    async function actualizarUsuario() {
      const usuarioStorage = JSON.parse(sessionStorage.getItem("usuario"));

      const res = await fetch(
        `http://localhost:8080/usuarios/${usuarioStorage.cedula}`
      );

      const usuarioActualizado = await res.json();
      sessionStorage.setItem("usuario", JSON.stringify(usuarioActualizado));
      usuario = usuarioActualizado;

      document.getElementById("notaComision").textContent =
        "Nota: Comisión por transferencia a otra persona será de " + obtenerComision();
    }

    /**
     * Escucha los cambios o pulsaciones de teclas en el campo de monto de transferencia para recalcular los costos agregados.
     */
    document.getElementById("valor").addEventListener("input", actualizarTotal);

    /**
     * Escucha las variaciones en el campo del destinatario para actualizar la presencia de la tarifa por comisión.
     */
    document.getElementById("destino").addEventListener("input", actualizarTotal);

    /**
     * Escucha la selección de una billetera de origen alternativa para reajustar los balances totales del formulario.
     */
    document.getElementById("billeteraSelect").addEventListener("change", actualizarTotal);

    /**
     * Autoejecución inmediata de tareas iniciales para la actualización de balances de usuario y la carga de billeteras utilizables.
     */
    (async () => {
      await actualizarUsuario();
      await cargarBilleteras();
    })();
  </script>

</body>

</html>
