<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billeteras</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 40px;
      overflow-y: auto;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 5px;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
    }

    .lista-billeteras {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .billetera-item {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .billetera-info {
      display: flex;
      flex-direction: column;
    }

    .billetera-nombre {
      font-weight: bold;
      font-size: 18px;
    }

    .billetera-meta {
      font-size: 13px;
      color: #64748b;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);

      display: flex;
      justify-content: center;
      align-items: center;

      z-index: 9999;

    }

    .popup-content {
      background: rgba(77, 130, 188, 0.85);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .popup-content p {
      margin-bottom: 20px;
    }

    .popup-content button {
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      cursor: pointer;
    }

    .popup-content button:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .hidden {
      display: none;
    }

    .form-field {
      display: flex;
      flex-direction: column;
    }

    .form-field label {
      font-size: 13px;
      margin-bottom: 5px;
      color: #e2e8f0;
    }

    .popup-content input,
    .popup-content select {
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;

      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .popup-content input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .popup-content select option {
      color: black;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
      gap: 15px;
    }

    .form-row label {
      width: 40%;
      font-size: 14px;
      color: #e2e8f0;
      text-align: right;
    }

    .form-row input,
    .form-row select {
      width: 60%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;

      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .form-row input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .form-row select option {
      color: black;
    }

    .acciones {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .error-msg {
      color: #ff9b9b;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .input-error {
      animation: shake 0.3s;
      border: 2px solid #ff9b9b !important;
    }

    .edit-error {
      width: 100%;
      text-align: center;
      margin: 10px 0;
    }

    .form-column {
      flex-direction: column;
      align-items: flex-start;
    }

    .form-column label {
      width: 100%;
      text-align: left;
      margin-bottom: 5px;
    }

    .form-column input {
      width: 100%;
    }

    .form-column .error-msg {
      width: 100%;
      text-align: left;
      margin-top: 5px;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }
  </style>
</head>

<body>

  <nav class="sidebar">
    <div class="nav-group">
      <a href="/home.html" class="nav-item"><img src="home.svg"><span>Inicio</span></a>
      <a href="/billetera.html" class="nav-item"><img src="billeteras.svg"><span>Billeteras</span></a>
      <a href="/recargar.html" class="nav-item"><img src="recargar.svg"><span>Recargar</span></a>
      <a href="/retirar.html" class="nav-item"><img src="retirar.svg"><span>Retirar</span></a>
      <a href="/transferir.html" class="nav-item"><img src="transferir.svg"><span>Transferir</span></a>
      <a class="nav-item"><img src="historial.svg"><span>Historial</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>
  </nav>

  <div class="content">
    <div class="container">

      <h1 class="titulo">Mis Billeteras</h1>

      <form class="card" onsubmit="crearBilletera(event)">
        <h3>Crear nueva billetera</h3>

        <input type="text" id="nombre" placeholder="Nombre" required>
        <div id="error-nombre" class="error-msg">Ya existe una billetera con ese nombre</div>

        <select id="tipo" required>
          <option value="">Selecciona tipo</option>
          <option value="AHORRO">Ahorro</option>
          <option value="GASTOS_DIARIOS">Gastos diarios</option>
          <option value="COMPRAS">Compras</option>
          <option value="TRANSPORTE">Transporte</option>
          <option value="INVERSION">Inversión</option>
        </select>

        <button class="btn">Crear</button>
      </form>

      <div class="lista-billeteras" id="listaBilleteras"></div>

    </div>
  </div>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <p id="popup-message"></p>

      <div id="popup-buttons" style="display:flex; gap:10px; justify-content:center;">
        <button id="btnAceptar" onclick="cerrarPopup()">Aceptar</button>

        <button id="btnSi" class="hidden">Sí</button>
        <button id="btnNo" class="hidden" onclick="cerrarPopup()">No</button>
      </div>
    </div>
  </div>

  <div id="popup-editar" class="popup hidden">
    <div class="popup-content">

      <h3 style="margin-bottom:20px;">Editar billetera</h3>

      <div class="form-row">
        <label>Nuevo nombre</label>
        <input type="text" id="editNombre" required>
      </div>

      <div id="error-edit-nombre" class="error-msg edit-error">
        Ya existe una billetera con ese nombre
      </div>

      <div class="form-row">
        <label>Nuevo tipo</label>
        <select id="editTipo" required>
          <option value="AHORRO">Ahorro</option>
          <option value="GASTOS_DIARIOS">Gastos diarios</option>
          <option value="COMPRAS">Compras</option>
          <option value="TRANSPORTE">Transporte</option>
          <option value="INVERSION">Inversión</option>
        </select>
      </div>

      <div class="acciones">
        <button id="btnActualizar" class="btn">Actualizar</button>
        <button onclick="cerrarPopupEditar()" class="btn btn-limpiar">Cancelar</button>
      </div>

    </div>
  </div>

  <script>
    const usuario = JSON.parse(sessionStorage.getItem("usuario"));
    let listaActualBilleteras = [];

    if (!usuario) {
      window.location.href = "/login.html";
    }

    async function crearBilletera(event) {
      event.preventDefault();

      const nombre = document.getElementById("nombre").value;
      const tipo = document.getElementById("tipo").value;
      const error = document.getElementById("error-nombre");
      error.style.display = "none";

      if (nombreRepetido(nombre)) {
        const input = document.getElementById("nombre");

        error.style.display = "block";
        reiniciarErrorAnimacion(input);
        return;
      }

      const billetera = {
        nombre,
        tipo
      };

      try {
        const res = await fetch(`http://localhost:8080/billeteras/${usuario.cedula}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(billetera)
        });

        if (!res.ok) throw new Error();

        mostrarPopup("Billetera creada");

        document.getElementById("nombre").value = "";
        document.getElementById("tipo").value = "";

        cargarBilleteras();

      } catch {
        mostrarPopup("Error al crear billetera");
      }
    }

    async function cargarBilleteras() {
      try {
        const res = await fetch(`http://localhost:8080/billeteras/${usuario.cedula}`);
        const data = await res.json();
        listaActualBilleteras = data;

        const contenedor = document.getElementById("listaBilleteras");
        contenedor.innerHTML = "";

        data.forEach(b => {
          contenedor.innerHTML += `
        <div class="billetera-item">
          <div class="billetera-info">
            <span class="billetera-nombre">${b.nombre}</span>
            <span class="billetera-meta" style="font-weight:bold; color:#334155;">Número de billetera: ${b.id}</span>
            <span class="billetera-meta">${formatearTipo(b.tipo)}</span>
            <span class="billetera-meta">Saldo: $${(b.saldo || 0).toLocaleString()}</span>
            <span class="billetera-meta">Estado: ${b.estado}</span>
          </div>

          <div style="display:flex; gap:10px;">
            <button class="btn" onclick="editarBilletera('${b.id}', '${b.nombre}', '${b.tipo}')">Editar</button>
            <button class="btn" style="background:#ff6b6b;" onclick="eliminarBilletera('${b.id}')">Eliminar</button>
          </div>
        </div>
      `;
        });

      } catch (e) {
        console.error(e);
      }
    }

    function eliminarBilletera(id) {
      mostrarConfirmacion(
        "¿Estás seguro que quieres eliminar la billetera?",
        async () => {
          try {
            const res = await fetch(`http://localhost:8080/billeteras/${usuario.cedula}/${id}`, {
              method: "DELETE"
            });

            if (!res.ok) {
              const msg = await res.text();
              mostrarPopup(msg);
              return;
            }

            mostrarPopup("Billetera eliminada");
            cargarBilleteras();

          } catch {
            mostrarPopup("Error al eliminar");
          }
        }
      );
    }

    function mostrarPopup(mensaje) {
      document.getElementById("popup-message").textContent = mensaje;

      document.getElementById("btnAceptar").classList.remove("hidden");
      document.getElementById("btnSi").classList.add("hidden");
      document.getElementById("btnNo").classList.add("hidden");

      document.getElementById("popup").classList.remove("hidden");
    }

    function mostrarConfirmacion(mensaje, onConfirmar) {
      document.getElementById("popup-message").textContent = mensaje;

      document.getElementById("btnAceptar").classList.add("hidden");
      document.getElementById("btnSi").classList.remove("hidden");
      document.getElementById("btnNo").classList.remove("hidden");

      document.getElementById("popup").classList.remove("hidden");

      const btnSi = document.getElementById("btnSi");
      const nuevoBtnSi = btnSi.cloneNode(true);
      btnSi.parentNode.replaceChild(nuevoBtnSi, btnSi);

      nuevoBtnSi.onclick = () => {
        cerrarPopup();
        onConfirmar();
      };
    }

    function cerrarPopup() {
      document.getElementById("popup").classList.add("hidden");
    }

    function logout() {
      sessionStorage.removeItem("usuario");
    }

    function formatearTipo(tipo) {
      return tipo.replaceAll("_", " ");
    }

    function nombreRepetido(nombre, ignorarId = null) {
      return listaActualBilleteras.some(b =>
        b.nombre.toLowerCase() === nombre.toLowerCase() &&
        b.id !== ignorarId
      );
    }

    let billeteraEditandoId = null;

    function editarBilletera(id, nombre, tipo) {
      billeteraEditandoId = id.toString();

      document.getElementById("editNombre").value = nombre;
      document.getElementById("editTipo").value = tipo;

      const error = document.getElementById("error-edit-nombre");
      const input = document.getElementById("editNombre");

      error.style.display = "none";
      input.classList.remove("input-error");

      document.getElementById("popup-editar").classList.remove("hidden");
    }

    function cerrarPopupEditar() {
      document.getElementById("popup-editar").classList.add("hidden");
    }

    document.getElementById("btnActualizar").addEventListener("click", async () => {

      const nombre = document.getElementById("editNombre").value;
      const tipo = document.getElementById("editTipo").value;

      if (nombreRepetido(nombre, billeteraEditandoId)) {
        const input = document.getElementById("editNombre");
        const error = document.getElementById("error-edit-nombre");

        error.style.display = "block";
        reiniciarErrorAnimacion(input);

        return;
      }

      const datos = {
        nombre,
        tipo
      };

      try {
        const res = await fetch(`http://localhost:8080/billeteras/${usuario.cedula}/${billeteraEditandoId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(datos)
        });

        if (!res.ok) throw new Error();

        cerrarPopupEditar();
        mostrarPopup("Billetera actualizada");
        cargarBilleteras();

      } catch {
        mostrarPopup("Error al actualizar");
      }

    });

    function reiniciarErrorAnimacion(element) {
      element.classList.remove("input-error");
      void element.offsetWidth;
      element.classList.add("input-error");
    }

    function nombreRepetido(nombre, ignorarId = null) {
      return listaActualBilleteras.some(b =>
        b.nombre.toLowerCase() === nombre.toLowerCase() &&
        b.id.toString() !== ignorarId
      );
    }

    document.getElementById("editNombre").addEventListener("input", () => {
      const input = document.getElementById("editNombre");
      const error = document.getElementById("error-edit-nombre");

      error.style.display = "none";
      input.classList.remove("input-error");
    });

    document.getElementById("nombre").addEventListener("input", () => {
      const input = document.getElementById("nombre");
      const error = document.getElementById("error-nombre");

      error.style.display = "none";
      input.classList.remove("input-error");
    });

    cargarBilleteras();
  </script>

</body>

</html>
