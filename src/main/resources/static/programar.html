<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programar Transacción</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 850px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .tipo-selector {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tipo-btn {
      flex: 1;
      min-width: 150px;
      border: none;
      padding: 14px;
      border-radius: 14px;
      background: #4d82bc;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
    }

    .tipo-btn:hover {
      opacity: 0.9;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .form-row label {
      font-size: 14px;
      color: white;
      text-align: left;
    }

    .form-row select,
    .form-row input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    input[readonly] {
      background: #f1f5f9;
      color: #64748b;
      cursor: not-allowed;
    }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 35px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
      transition: 0.2s ease;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .input-error {
      animation: shake 0.3s;
      border: 2px solid #ff9b9b !important;
    }

    #error-msg {
      color: #ffd5d5;
      font-size: 13px;
      display: none;
      margin-top: 5px;
      text-align: left;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    .hidden {
      display: none !important;
    }

    #lista {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
      margin-top: 25px;
    }

    .lista-animada {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    .lista-animada.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .transaccion {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .estado {
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
    }

    .estado.pendiente {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .estado.completada {
      background: #dcfce7;
      color: #15803d;
    }

    .estado.cancelada,
    .estado.fallida,
    .estado.revertida {
      background: #fee2e2;
      color: #b91c1c;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background: rgba(77, 130, 188, 0.9);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      width: 700px;
      max-width: 95%;
    }

    .popup-content button {
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    .popup-content button:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .paginacion {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding-top: 15px;
    }
  </style>
</head>

<body>

  <nav class="sidebar">
    <div class="nav-group">
      <a href="/home.html" class="nav-item"><img src="images/home.svg"><span>Inicio</span></a>
      <a href="/billetera.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/recargar.html" class="nav-item"><img src="images/recargar.svg"><span>Recargar</span></a>
      <a href="/retirar.html" class="nav-item"><img src="images/retirar.svg"><span>Retirar</span></a>
      <a href="/transferir.html" class="nav-item"><img src="images/transferir.svg"><span>Transferir</span></a>
      <a href="/programar.html" class="nav-item"><img src="images/programar.svg"><span>Programar</span></a>
      <a href="/historial.html" class="nav-item"><img src="images/historial.svg"><span>Historial</span></a>
      <a href="/canjear.html" class="nav-item"><img src="images/canjear.svg"><span>Canjear</span></a>
      <a href="/soporte.html" class="nav-item"><img src="images/support.svg"><span>Soporte</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>
  </nav>

  <div class="content">

    <div class="container">

      <h1 class="titulo">
        Programar Transacciones
      </h1>

      <div class="card">

        <h3 style="margin-bottom:20px; color:#334155;">
          Selecciona la transacción a programar
        </h3>

        <div class="tipo-selector">

          <button class="tipo-btn" onclick="abrirPopupProgramar('RECARGA')">
            Recarga
          </button>

          <button class="tipo-btn" onclick="abrirPopupProgramar('RETIRO')">
            Retiro
          </button>

          <button class="tipo-btn" onclick="abrirPopupProgramar('TRANSFERENCIA')">
            Transferencia
          </button>

        </div>

      </div>

      <div id="lista"></div>

      <div id="paginacion" class="paginacion"></div>

    </div>

  </div>

  <div id="popupProgramar" class="popup hidden">

    <div class="popup-content">

      <div style="margin-bottom:20px;">

        <div style="display:flex; justify-content:space-between; align-items:flex-start;">

          <div style="display:flex; flex-direction:column; align-items:flex-start;">

            <h2 id="tituloPopupProgramar">
              Programar
            </h2>

            <div id="notaComision" style="
              font-size:13px;
              margin-top:6px;
              color:#e2e8f0;
              text-align:left;
              width:100%;">
            </div>

          </div>

          <button onclick="cerrarPopupProgramar()">
            ✕
          </button>

        </div>

      </div>

      <div class="form-grid">

        <div class="form-row">
          <label>Billetera origen</label>
          <select id="origen"></select>
        </div>

        <div class="form-row hidden" id="destinoRow">

          <label>Billetera destino</label>

          <input type="text" id="destino" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>

        <div class="form-row">

          <label>Valor</label>

          <div class="input-group">

            <input type="text" id="valor" inputmode="numeric" oninput="formatearMiles(this)">

            <div id="error-msg"></div>

          </div>
        </div>

        <div class="form-row hidden" id="totalRow">
          <label>Total a descontar</label>

          <input type="text" id="total" readonly>
        </div>

        <div class="form-row">
          <label>Fecha y hora</label>

          <input type="datetime-local" id="fecha" onchange="this.blur()">
        </div>

      </div>

      <button class="btn" onclick="programar()">
        Programar
      </button>

    </div>

  </div>

  <div id="popup" class="popup hidden">

    <div class="popup-content" style="width:420px;">

      <p id="popup-message"></p>

      <div id="popup-buttons" style="display:flex; justify-content:center; gap:10px;">

        <button id="btnAceptar" onclick="cerrarPopup()">
          Aceptar
        </button>

        <button id="btnConfirmar" class="hidden" onclick="confirmarCancelacion()">
          Sí
        </button>

        <button id="btnCancelar" class="hidden" onclick="cerrarPopup()">
          No
        </button>

      </div>

    </div>

  </div>

  <script>
    /**
     * Datos del usuario autenticado obtenidos desde la sesión.
     * @type {Object|null}
     */
    let usuario = JSON.parse(sessionStorage.getItem("usuario"));

    if (!usuario) {
      window.location.href = "/login.html";
    }

    /**
     * Define la categoría o tipo de transacción activa en el flujo actual (e.g., RECARGA, TRANSFERENCIA).
     * @type {string}
     */
    let tipoActual = "RECARGA";

    /**
     * Listado de billeteras asociadas a la cuenta del usuario.
     * @type {Array<Object>}
     */
    let billeteras = [];

    /**
     * Listado general de transacciones programadas del usuario.
     * @type {Array<Object>}
     */
    let programadas = [];

    /**
     * Almacena temporalmente el identificador de la transacción que se pretende cancelar.
     * @type {string|number|null}
     */
    let idPendienteCancelar = null;

    /**
     * Índice de la página de transacciones programadas visible en la interfaz.
     * @type {number}
     */
    let paginaActual = 1;

    /**
     * Cantidad máxima de transacciones programadas visibles por página.
     * @type {number}
     */
    const porPagina = 3;

    /**
     * Devuelve la representación textual del porcentaje de comisión según la categoría de fidelidad del usuario.
     * @returns {string} Cadena que representa el porcentaje aplicable (e.g., "0.4%").
     */
    function obtenerComision() {

      switch (usuario.nivel) {

        case "PLATA":
          return "0.4%";

        case "ORO":
          return "0.3%";

        case "PLATINO":
          return "0.1%";

        default:
          return "0.5%";
      }
    }

    /**
     * Calcula el monto numérico equivalente de la comisión basándose en el nivel del usuario y un valor base.
     * @param {number} valor - El importe base sobre el cual calcular la comisión.
     * @returns {number} El valor redondeado de la comisión resultante.
     */
    function calcularComision(valor) {

      let porcentaje = 0.005;

      switch (usuario.nivel) {

        case "PLATA":
          porcentaje = 0.004;
          break;

        case "ORO":
          porcentaje = 0.003;
          break;

        case "PLATINO":
          porcentaje = 0.001;
          break;
      }

      return Math.round(valor * porcentaje);
    }

    /**
     * Verifica si una billetera de destino seleccionada se encuentra dentro del grupo de cuentas del propio usuario.
     * @param {string|number} destinoId - Identificador de la billetera a evaluar.
     * @returns {boolean} Verdadero si la billetera pertenece al usuario, falso de lo contrario.
     */
    function esBilleteraPropia(destinoId) {

      return billeteras.some(
        b => String(b.id) === String(destinoId)
      );
    }

    /**
     * Recalcula dinámicamente el costo total de la operación (incluyendo comisiones si aplican) y actualiza el campo correspondiente en el DOM.
     * @returns {void}
     */
    function actualizarTotal() {

      const valorInput =
        document.getElementById("valor");

      const totalInput =
        document.getElementById("total");

      const valor = parseFloat(
        valorInput.value.replace(/\./g, "")
      );

      const destinoId =
        document.getElementById("destino").value;

      if (!valor || valor <= 0) {

        totalInput.value = "";
        return;
      }

      let total = valor;

      if (
        tipoActual === "TRANSFERENCIA"
        && !esBilleteraPropia(destinoId)
      ) {

        const comision =
          calcularComision(valor);

        total += comision;
      }

      totalInput.value =
        Math.round(total)
          .toLocaleString("es-CO");
    }

    /**
     * Consume el servicio para obtener las billeteras del usuario e inyecta las opciones en el elemento selector del DOM.
     * @returns {Promise<void>}
     */
    async function cargarBilleteras() {

      const res = await fetch(
        `http://localhost:8080/billeteras/${usuario.cedula}`
      );

      billeteras = await res.json();

      const select = document.getElementById("origen");

      select.innerHTML = "";

      billeteras.forEach(b => {

        select.innerHTML += `
          <option value="${b.id}">
            ${b.nombre}
          </option>
        `;
      });
    }

    /**
     * Configura y abre el diálogo emergente para programar una operación, modificando la visibilidad de los campos según el tipo de transacción.
     * @param {string} tipo - Tipo de transacción a configurar (e.g., "TRANSFERENCIA").
     * @returns {Promise<void>}
     */
    async function abrirPopupProgramar(tipo) {
      await actualizarUsuario();
      tipoActual = tipo;

      document.getElementById("popupProgramar")
        .classList.remove("hidden");

      document.getElementById("notaComision")
        .textContent = "";

      document.getElementById("tituloPopupProgramar")
        .textContent =
        "Programar " + tipo.toLowerCase();

      const destinoRow =
        document.getElementById("destinoRow");

      const totalRow =
        document.getElementById("totalRow");

      if (tipo === "TRANSFERENCIA") {

        destinoRow.classList.remove("hidden");
        totalRow.classList.remove("hidden");

        document.getElementById("notaComision")
          .textContent =
          "Nota: Comisión por transferencia a otra persona será de "
          + obtenerComision();

      } else {

        destinoRow.classList.add("hidden");
        totalRow.classList.add("hidden");

        document.getElementById("notaComision")
          .textContent = "";
      }

      actualizarTotal();
    }

    /**
     * Restablece los campos del formulario de programación y oculta la ventana emergente de la vista.
     * @returns {void}
     */
    function cerrarPopupProgramar() {

      document.getElementById("popupProgramar")
        .classList.add("hidden");

      document.getElementById("valor").value = "";
      document.getElementById("destino").value = "";
      document.getElementById("fecha").value = "";

      document.getElementById("error-msg").style.display = "none";

      document.getElementById("valor")
        .classList.remove("input-error");
    }

    /**
     * Valida las restricciones de negocio (fechas, montos y cuentas) y envía la solicitud de registro de la transacción programada al servidor.
     * @returns {Promise<void>}
     */
    async function programar() {

      const origen = document.getElementById("origen").value;
      const destino = document.getElementById("destino").value;
      const fecha = document.getElementById("fecha").value;

      const valorInput = document.getElementById("valor");

      const valor = parseFloat(
        valorInput.value.replace(/\./g, "")
      );

      const errorMsg =
        document.getElementById("error-msg");

      const billetera =
        billeteras.find(b => String(b.id) === String(origen));

      if (!valor || valor <= 0) {

        errorMsg.textContent =
          "El valor debe ser mayor que 0";

        errorMsg.style.display = "block";

        valorInput.classList.remove("input-error");
        void valorInput.offsetWidth;
        valorInput.classList.add("input-error");

        return;
      }

      if (!fecha) {

        mostrarPopup(
          "Debes seleccionar una fecha válida"
        );

        return;
      }

      const fechaSeleccionada =
        new Date(fecha);

      const ahora = new Date();

      ahora.setMinutes(
        ahora.getMinutes() + 1
      );

      if (fechaSeleccionada < ahora) {

        mostrarPopup(
          "La fecha debe ser mínimo 1 minuto después de la hora actual"
        );

        return;
      }

      if (tipoActual === "TRANSFERENCIA" && origen === destino) {

        mostrarPopup(
          "No puedes transferir a la misma billetera"
        );

        return;
      }

      errorMsg.style.display = "none";

      valorInput.classList.remove("input-error");

      try {

        const params = new URLSearchParams({
          cedula: usuario.cedula,
          tipo: tipoActual,
          valor: valor,
          origen: origen,
          fecha: fecha
        });

        if (tipoActual === "TRANSFERENCIA") {
          params.append("destino", destino);
        }

        const res = await fetch(
          `http://localhost:8080/transacciones-programadas/programar?${params}`,
          {
            method: "POST"
          }
        );

        const mensaje = await res.text();

        if (!res.ok) {

          mostrarPopup(mensaje);
          return;
        }

        mostrarPopup(mensaje);

        cerrarPopupProgramar();

        cargarProgramadas();

      } catch {

        mostrarPopup(
          "Error al programar transacción"
        );
      }
    }

    /**
     * Solicita al servidor el listado actualizado de transacciones programadas y las ordena de forma cronológica descendente.
     * @param {boolean} [auto=false] - Define si la consulta es automática (evita reiniciar el índice de paginación).
     * @returns {Promise<void>}
     */
    async function cargarProgramadas(auto = false) {

      const res = await fetch(
        `http://localhost:8080/transacciones-programadas/listar/${usuario.cedula}`
      );

      programadas = await res.json();

      programadas.sort((a, b) =>
        new Date(b.fecha)
        - new Date(a.fecha)
      );

      if (!auto) {
        paginaActual = 1;
      }

      render(auto);
    }

    /**
     * Administra las transiciones visuales y delega la inyección de los bloques de transacciones programadas en el DOM.
     * @param {boolean} [sinAnimacion=false] - Indica si se omite el efecto de desvanecimiento en la actualización.
     * @returns {void}
     */
    function render(sinAnimacion = false) {

      const lista = document.getElementById("lista");

      if (!sinAnimacion) {

        lista.classList.add("fade");

        setTimeout(() => {
          dibujar();
        }, 200);

      } else {

        dibujar();
      }

      /**
       * Segmenta el arreglo de datos según la página actual y genera los elementos HTML correspondientes en el contenedor de la lista.
       * @returns {void}
       */
      function dibujar() {

        lista.classList.remove("fade");
        lista.classList.add("lista-animada");

        lista.innerHTML = "";

        const inicio =
          (paginaActual - 1) * porPagina;

        const fin = inicio + porPagina;

        const pagina =
          programadas.slice(inicio, fin);

        pagina.forEach(t => {
          console.log(t.fecha);
          console.log(typeof t.fecha);
          lista.innerHTML += `
            <div class="transaccion">

              <div>

                <b>${t.tipo}</b><br>

                ${formatearFecha(t.fecha)}
                <br>

                <span style="font-weight:bold;">
                  $${formatearNumero(t.valor)}
                </span>

              </div>

              <div style="display:flex; align-items:center; gap:10px;">

                <span class="estado ${t.estado.toLowerCase()}">
                  ${t.estado}
                </span>

                ${t.estado === "PENDIENTE"
              ? `
                    <button
                      class="btn"
                      style="margin:0;"
                      onclick="cancelar('${t.id}')"
                    >
                      Cancelar
                    </button>
                  `
              : ""
            }

              </div>

            </div>
          `;
        });

        renderPaginacion();
      }
    }

    /**
     * Calcula el volumen de páginas totales e inyecta los elementos de control y navegación en el DOM.
     * @returns {void}
     */
    function renderPaginacion() {

      const totalPaginas =
        Math.ceil(programadas.length / porPagina);

      const cont =
        document.getElementById("paginacion");

      cont.innerHTML = "";

      if (totalPaginas <= 1) return;

      cont.innerHTML = `
        <button
          class="btn"
          onclick="cambiarPagina(-1)"
          ${paginaActual === 1 ? 'disabled' : ''}
        >
          ←
        </button>

        <span>
          Página ${paginaActual} de ${totalPaginas}
        </span>

        <button
          class="btn"
          onclick="cambiarPagina(1)"
          ${paginaActual === totalPaginas ? 'disabled' : ''}
        >
          →
        </button>
      `;
    }

    /**
     * Modifica el índice de paginación global y refresca el renderizado de la lista.
     * @param {number} dir - Desplazamiento numérico para cambiar de página (usualmente -1 o 1).
     * @returns {void}
     */
    function cambiarPagina(dir) {

      paginaActual += dir;

      render();
    }

    /**
     * Abre el modal de confirmación de cancelación asociándole el identificador de la transacción seleccionada.
     * @param {string|number} id - Identificador de la transacción que se planea revocar.
     * @returns {void}
     */
    function cancelar(id) {

      idPendienteCancelar = id;

      document.getElementById("popup-message")
        .textContent =
        "¿Seguro que deseas cancelar la transacción programada?";

      document.getElementById("btnAceptar")
        .classList.add("hidden");

      document.getElementById("btnConfirmar")
        .classList.remove("hidden");

      document.getElementById("btnCancelar")
        .classList.remove("hidden");

      document.getElementById("popup")
        .classList.remove("hidden");
    }

    /**
     * Ejecuta de forma asíncrona la petición de cancelación de la transacción guardada en memoria y refresca la lista de transacciones.
     * @returns {Promise<void>}
     */
    async function confirmarCancelacion() {

      try {

        const res = await fetch(
          `http://localhost:8080/transacciones-programadas/cancelar/${usuario.cedula}/${idPendienteCancelar}`,
          {
            method: "POST"
          }
        );

        const mensaje = await res.text();

        mostrarPopup(mensaje);

        cargarProgramadas(true);

      } catch {

        mostrarPopup(
          "Error al cancelar transacción"
        );
      }

      idPendienteCancelar = null;
    }

    /**
     * Procesa la entrada de texto de un input aislando caracteres no numéricos y formateándolo dinámicamente con separadores de miles.
     * @param {HTMLElement} input - El elemento input del DOM que se está digitando.
     * @returns {void}
     */
    function formatearMiles(input) {

      let valor =
        input.value.replace(/\./g, "");

      valor =
        valor.replace(/[^0-9]/g, "");

      if (valor === "") {
        input.value = "";
        actualizarTotal();
        return;
      }

      input.value = Number(valor).toLocaleString("es-CO");
      actualizarTotal();
    }

    /**
     * Convierte un valor numérico a una representación con separadores de miles regionales (Colombia).
     * @param {number|string} valor - Número o cadena numérica a procesar.
     * @returns {string} Cadena formateada para su visualización.
     */
    function formatearNumero(valor) {

      return Number(valor)
        .toLocaleString("es-CO");
    }

    /**
     * Convierte una fecha ISO estándar en un formato amigable localizado en español colombiano (12 horas).
     * @param {string} fechaISO - Fecha estándar de origen.
     * @returns {string} Estructura legible de fecha y hora.
     */
    function formatearFecha(fechaISO) {

      const f = new Date(fechaISO);

      const dia = f.getDate();

      const mes = f.toLocaleString(
        "es-CO",
        { month: "long" }
      );

      const anio = f.getFullYear();

      let horas = f.getHours();

      const minutes =
        String(f.getMinutes()).padStart(2, "0");

      const ampm =
        horas >= 12 ? "p.m." : "a.m.";

      horas = horas % 12 || 12;

      return `
        ${dia} de ${mes} ${anio},
        ${horas}:${minutes} ${ampm}
      `;
    }

    /**
     * Muestra un popup genérico adaptando la visibilidad de los botones para que actúe de modo informativo (aceptar).
     * @param {string} mensaje - El texto explicativo a mostrar en la interfaz.
     * @returns {void}
     */
    function mostrarPopup(mensaje) {

      document.getElementById("popup-message")
        .textContent = mensaje;

      document.getElementById("btnAceptar")
        .classList.remove("hidden");

      document.getElementById("btnConfirmar")
        .classList.add("hidden");

      document.getElementById("btnCancelar")
        .classList.add("hidden");

      document.getElementById("popup")
        .classList.remove("hidden");
    }

    /**
     * Oculta el popup flotante o modal de la interfaz de usuario.
     * @returns {void}
     */
    function cerrarPopup() {

      document.getElementById("popup")
        .classList.add("hidden");
    }

    /**
     * Destruye las credenciales de la sesión activa del usuario para desautenticarlo del sistema.
     * @returns {void}
     */
    function logout() {
      sessionStorage.removeItem("usuario");
    }

    /**
     * Sincroniza la información del usuario consultando sus datos actualizados en el servidor remoto y refrescando la sesión local.
     * @returns {Promise<void>}
     */
    async function actualizarUsuario() {

      const usuarioStorage =
        JSON.parse(sessionStorage.getItem("usuario"));

      const res = await fetch(
        `http://localhost:8080/usuarios/${usuarioStorage.cedula}`
      );

      const usuarioActualizado = await res.json();

      sessionStorage.setItem(
        "usuario",
        JSON.stringify(usuarioActualizado)
      );

      usuario = usuarioActualizado;
    }

    /**
     * Escucha la inserción de datos en el campo de valor monetario para limpiar las alertas visuales de error.
     */
    document.getElementById("valor")
      .addEventListener("input", function () {

        const errorMsg =
          document.getElementById("error-msg");

        errorMsg.style.display = "none";

        this.classList.remove("input-error");
      });

    /**
     * Escucha la inserción o cambio del destino de la transacción para recalcular los montos totales de la operación.
     */
    document.getElementById("destino")
      .addEventListener("input", actualizarTotal);

    /**
     * Escucha la modificación de la billetera de origen para actualizar los montos de cobro totales de la operación.
     */
    document.getElementById("origen")
      .addEventListener("change", actualizarTotal);

    cargarBilleteras();
    cargarProgramadas();

    /**
     * Setea un intervalo de refresco automático que consulta y sincroniza el estado de las transacciones programadas cada 5 segundos.
     */
    setInterval(() => {
      cargarProgramadas(true);
    }, 5000);

  </script>

</body>
