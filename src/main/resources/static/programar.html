<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programar Transacción</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 850px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .tipo-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .tipo-btn {
      flex: 1;
      min-width: 150px;
      border: none;
      padding: 14px;
      border-radius: 14px;
      background: #e2e8f0;
      color: #334155;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
    }

    .tipo-btn.active {
      background: #4d82bc;
      color: white;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .form-row label {
      font-size: 14px;
      color: #64748b;
    }

    .form-row select,
    .form-row input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 35px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
      display: block;
      margin-left: auto;
      margin-right: auto;
      transition: 0.2s ease;
    }

    .input-error {
      animation: shake 0.3s;
      border: 2px solid #ff9b9b !important;
    }

    #error-msg {
      color: #ff6b6b;
      font-size: 13px;
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      width: 100%;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    .hidden {
      display: none !important;
    }

    #lista {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
      margin-top: 25px;
    }

    .lista-animada {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    .lista-animada.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .transaccion {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .estado {
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
    }

    .estado.pendiente {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .estado.completada {
      background: #dcfce7;
      color: #15803d;
    }

    .estado.cancelada {
      background: #fee2e2;
      color: #b91c1c;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background: rgba(77, 130, 188, 0.85);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      width: 420px;
      max-width: 90%;
    }

    .popup-content p {
      margin-bottom: 20px;
    }

    .popup-content button {
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      cursor: pointer;
    }

    .popup-content button:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .paginacion {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding-top: 15px;
    }

    .paginacion .btn {
      margin: 0;
      display: inline-block;
    }

    #lista {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }

    .transaccion {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>

<body>

  <nav class="sidebar">
    <div class="nav-group">
      <a href="/home.html" class="nav-item"><img src="home.svg"><span>Inicio</span></a>
      <a href="/billetera.html" class="nav-item"><img src="billeteras.svg"><span>Billeteras</span></a>
      <a href="/recargar.html" class="nav-item"><img src="recargar.svg"><span>Recargar</span></a>
      <a href="/retirar.html" class="nav-item"><img src="retirar.svg"><span>Retirar</span></a>
      <a href="/transferir.html" class="nav-item"><img src="transferir.svg"><span>Transferir</span></a>
      <a href="/programar.html" class="nav-item"><img src="programar.svg"><span>Programar</span></a>
      <a href="/historial.html" class="nav-item"><img src="historial.svg"><span>Historial</span></a>
      <a href="/canjear.html" class="nav-item"><img src="canjear.svg"><span>Canjear</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>
  </nav>

  <div class="content">
    <div class="container">

      <h1 class="titulo">Programar Transacciones</h1>

      <div class="card">

        <div class="tipo-selector">
          <button class="tipo-btn active" onclick="seleccionarTipo('RECARGA', this)">
            Recarga
          </button>

          <button class="tipo-btn" onclick="seleccionarTipo('RETIRO', this)">
            Retiro
          </button>

          <button class="tipo-btn" onclick="seleccionarTipo('TRANSFERENCIA', this)">
            Transferencia
          </button>
        </div>

        <div class="form-grid">

          <div class="form-row">
            <label>Billetera origen</label>
            <select id="origen"></select>
          </div>

          <div class="form-row hidden" id="destinoRow">
            <label>Billetera destino</label>

            <input type="text" id="destino" inputmode="numeric"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')">
          </div>

          <div class="form-row">
            <label>Valor</label>

            <div class="input-group">
              <input type="text" id="valor" inputmode="numeric" oninput="formatearMiles(this)">

              <div id="error-msg"></div>
            </div>
          </div>

          <div class="form-row">
            <label>Fecha y hora</label>
            <input type="datetime-local" id="fecha" onchange="this.blur()">
          </div>

        </div>

        <button class="btn" onclick="programar()">
          Programar
        </button>

      </div>

      <div id="lista"></div>

      <div id="paginacion" class="paginacion"></div>

    </div>
  </div>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <p id="popup-message"></p>
      <div id="popup-buttons" style="display:flex; justify-content:center; gap:10px;">
        <button id="btnAceptar" onclick="cerrarPopup()">
          Aceptar
        </button>

        <button id="btnConfirmar" class="hidden" onclick="confirmarCancelacion()">
          Sí
        </button>

        <button id="btnCancelar" class="hidden" onclick="cerrarPopup()">
          No
        </button>

      </div>
    </div>
  </div>

  <script>
    const usuario = JSON.parse(sessionStorage.getItem("usuario"));

    if (!usuario) {
      window.location.href = "/login.html";
    }

    let tipoActual = "RECARGA";
    let billeteras = [];
    let programadas = [];
    let idPendienteCancelar = null;

    let paginaActual = 1;
    const porPagina = 3;

    async function cargarBilleteras() {

      const res = await fetch(
        `http://localhost:8080/billeteras/${usuario.cedula}`
      );

      billeteras = await res.json();

      const select = document.getElementById("origen");

      select.innerHTML = "";

      billeteras.forEach(b => {
        select.innerHTML += `
          <option value="${b.id}">
            ${b.nombre}
          </option>
        `;
      });
    }

    function seleccionarTipo(tipo, btn) {

      tipoActual = tipo;

      document.querySelectorAll(".tipo-btn")
        .forEach(b => b.classList.remove("active"));

      btn.classList.add("active");

      const destinoRow =
        document.getElementById("destinoRow");

      if (tipo === "TRANSFERENCIA") {
        destinoRow.classList.remove("hidden");
      } else {
        destinoRow.classList.add("hidden");
      }
    }

    async function programar() {

      const origen = document.getElementById("origen").value;

      const destino = document.getElementById("destino").value;

      const fecha = document.getElementById("fecha").value;

      const valorInput = document.getElementById("valor");

      const valor = parseFloat(
        valorInput.value.replace(/\./g, "")
      );

      const errorMsg =
        document.getElementById("error-msg");

      const billetera =
        billeteras.find(b => String(b.id) === String(origen));

      if (!valor || valor <= 0) {

        errorMsg.textContent =
          "El valor debe ser mayor que 0";

        errorMsg.style.display = "block";

        valorInput.classList.remove("input-error");
        void valorInput.offsetWidth;
        valorInput.classList.add("input-error");

        return;
      }

      if (!fecha) {

        mostrarPopup(
          "Debes seleccionar una fecha válida"
        );

        return;
      }

      if (tipoActual === "TRANSFERENCIA" && origen === destino) {
        mostrarPopup("No puedes transferir a la misma billetera");

        return;
      }

      if (tipoActual === "TRANSFERENCIA") {
        let porcentaje = 0.005;
        switch (usuario.nivel) {
          case "PLATA":
            porcentaje = 0.004;
            break;

          case "ORO":
            porcentaje = 0.003;
            break;

          case "PLATINO":
            porcentaje = 0.001;
            break;
        }

        const comision =
          Math.round(valor * porcentaje);

        const total =
          valor + comision;

        if (total > billetera.saldo) {

          errorMsg.textContent =
            "No hay suficiente saldo disponible";

          errorMsg.style.display = "block";

          valorInput.classList.remove("input-error");
          void valorInput.offsetWidth;
          valorInput.classList.add("input-error");

          return;
        }
      }

      if (tipoActual === "RETIRO") {

        if (valor > billetera.saldo) {

          errorMsg.textContent =
            "No hay suficiente saldo disponible";

          errorMsg.style.display = "block";

          valorInput.classList.remove("input-error");
          void valorInput.offsetWidth;
          valorInput.classList.add("input-error");

          return;
        }
      }

      errorMsg.style.display = "none";

      valorInput.classList.remove("input-error");

      try {

        const params = new URLSearchParams({
          cedula: usuario.cedula,
          tipo: tipoActual,
          valor: valor,
          origen: origen,
          fecha: fecha
        });

        if (tipoActual === "TRANSFERENCIA") {
          params.append("destino", destino);
        }

        const res = await fetch(
          `http://localhost:8080/transacciones-programadas/programar?${params}`,
          {
            method: "POST"
          }
        );

        const mensaje = await res.text();

        if (!res.ok) {
          mostrarPopup(mensaje);
          return;
        }

        mostrarPopup(mensaje);

        document.getElementById("valor").value = "";
        document.getElementById("destino").value = "";
        document.getElementById("fecha").value = "";

        cargarProgramadas();

      } catch {

        mostrarPopup(
          "Error al programar transacción"
        );
      }
    }

    async function cargarProgramadas(auto = false) {
      const res = await fetch(
        `http://localhost:8080/transacciones-programadas/listar/${usuario.cedula}`
      );

      programadas = await res.json();

      programadas.sort((a, b) =>
        new Date(b.fechaEjecucion)
        - new Date(a.fechaEjecucion)
      );

      if (!auto) {
        paginaActual = 1;
      }

      render(auto);
    }

    function render(sinAnimacion = false) {

      const lista = document.getElementById("lista");

      if (!sinAnimacion) {

        lista.classList.add("fade");

        setTimeout(() => {
          dibujar();
        }, 200);

      } else {
        dibujar();
      }

      function dibujar() {

        lista.classList.remove("fade");
        lista.classList.add("lista-animada");

        lista.innerHTML = "";

        const inicio =
          (paginaActual - 1) * porPagina;

        const fin = inicio + porPagina;

        const pagina =
          programadas.slice(inicio, fin);

        pagina.forEach(t => {

          lista.innerHTML += `
            <div class="transaccion">

              <div>
                <b>${t.tipo}</b><br>

                ${formatearFecha(t.fechaEjecucion)}
                <br>

                <span style="font-weight:bold;">
                  $${formatearNumero(t.valor)}
                </span>
              </div>

              <div style="display:flex; align-items:center; gap:10px;">

                <span class="estado ${t.estado.toLowerCase()}">
                ${t.estado}
                </span>

                ${t.estado === "PENDIENTE"
              ? `
                    <button
                      class="btn"
                      style="margin:0;"
                      onclick="cancelar('${t.id}')"
                    >
                      Cancelar
                    </button>
                  `
              : ""
            }

              </div>

            </div>
          `;
        });

        renderPaginacion();
      }
    }

    function renderPaginacion() {

      const totalPaginas =
        Math.ceil(programadas.length / porPagina);

      const cont =
        document.getElementById("paginacion");

      cont.innerHTML = "";

      if (totalPaginas <= 1) return;

      cont.innerHTML = `
      <button
        class="btn"
        onclick="cambiarPagina(-1)"
        ${paginaActual === 1 ? 'disabled' : ''}
      >
        ←
      </button>

      <span>
        Página ${paginaActual} de ${totalPaginas}
      </span>

      <button
        class="btn"
        onclick="cambiarPagina(1)"
        ${paginaActual === totalPaginas ? 'disabled' : ''}
      >
        →
      </button>
    `;
    }

    function cambiarPagina(dir) {
      paginaActual += dir;
      render();
    }

    function cancelar(id) {
      idPendienteCancelar = id;

      document.getElementById("popup-message")
        .textContent =
        "¿Seguro que deseas cancelar la transacción programada?";

      document.getElementById("btnAceptar")
        .classList.add("hidden");

      document.getElementById("btnConfirmar")
        .classList.remove("hidden");

      document.getElementById("btnCancelar")
        .classList.remove("hidden");

      document.getElementById("popup")
        .classList.remove("hidden");
    }

    async function confirmarCancelacion() {
      try {
        const res = await fetch(
          `http://localhost:8080/transacciones-programadas/cancelar/${usuario.cedula}/${idPendienteCancelar}`,
          {
            method: "POST"
          }
        );

        const mensaje = await res.text();

        mostrarPopup(mensaje);

        cargarProgramadas(true);

      } catch {

        mostrarPopup(
          "Error al cancelar transacción"
        );
      }

      idPendienteCancelar = null;
    }

    function formatearMiles(input) {

      let valor =
        input.value.replace(/\./g, "");

      valor =
        valor.replace(/[^0-9]/g, "");

      if (valor === "") {

        input.value = "";
        return;
      }

      input.value =
        Number(valor).toLocaleString("es-CO");
    }

    function formatearNumero(valor) {
      return Number(valor).toLocaleString("es-CO");
    }

    function formatearFecha(fechaISO) {

      const f = new Date(fechaISO);

      const dia = f.getDate();

      const mes = f.toLocaleString(
        "es-CO",
        { month: "long" }
      );

      const anio = f.getFullYear();

      let horas = f.getHours();

      const minutos =
        String(f.getMinutes()).padStart(2, "0");

      const ampm =
        horas >= 12 ? "p.m." : "a.m.";

      horas = horas % 12 || 12;

      return `
        ${dia} de ${mes} ${anio},
        ${horas}:${minutos} ${ampm}
      `;
    }

    function mostrarPopup(mensaje) {
      document.getElementById("popup-message")
        .textContent = mensaje;

      document.getElementById("btnAceptar")
        .classList.remove("hidden");

      document.getElementById("btnConfirmar")
        .classList.add("hidden");

      document.getElementById("btnCancelar")
        .classList.add("hidden");

      document.getElementById("popup")
        .classList.remove("hidden");
    }

    function cerrarPopup() {

      document.getElementById("popup")
        .classList.add("hidden");
    }

    function logout() {
      sessionStorage.removeItem("usuario");
    }

    document.getElementById("valor")
      .addEventListener("input", function () {

        const errorMsg =
          document.getElementById("error-msg");

        errorMsg.style.display = "none";

        this.classList.remove("input-error");
      });

    cargarBilleteras();
    cargarProgramadas();

    setInterval(() => {
      cargarProgramadas(true);
    }, 5000);
  </script>

</body>

</html>
