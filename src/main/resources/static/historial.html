<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 800px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: flex-end;
    }

    .filtro {
      display: flex;
      flex-direction: column;
      font-size: 13px;
      color: #64748b;
      justify-content: flex-end;
    }

    #lista {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }

    .filtro select,
    .filtro input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 5px;
      width: 160px;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
    }

    .transaccion {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background: rgba(77, 130, 188, 0.85);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .popup-content button {
      margin-top: 15px;
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .detalle-box {
      background: white;
      color: black;
      padding: 25px;
      border-radius: 20px;
      width: 400px;
      position: relative;
    }

    .cerrar {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
    }

    .lista-animada {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    .lista-animada.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .paginacion {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding-top: 15px;
    }
  </style>
</head>

<body>

  <nav class="sidebar">
    <div class="nav-group">
      <a href="/home.html" class="nav-item"><img src="images/home.svg"><span>Inicio</span></a>
      <a href="/billetera.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/recargar.html" class="nav-item"><img src="images/recargar.svg"><span>Recargar</span></a>
      <a href="/retirar.html" class="nav-item"><img src="images/retirar.svg"><span>Retirar</span></a>
      <a href="/transferir.html" class="nav-item"><img src="images/transferir.svg"><span>Transferir</span></a>
      <a href="/programar.html" class="nav-item"><img src="images/programar.svg"><span>Programar</span></a>
      <a href="/historial.html" class="nav-item"><img src="images/historial.svg"><span>Historial</span></a>
      <a href="/canjear.html" class="nav-item"><img src="images/canjear.svg"><span>Canjear</span></a>
      <a href="/soporte.html" class="nav-item"><img src="images/support.svg"><span>Soporte</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>
  </nav>

  <div class="content">
    <div class="container">

      <h1 class="titulo">Historial de Transacciones</h1>

      <div class="card filtros">
        <div class="filtro">
          <label>Tipo</label>
          <select id="tipo">
            <option value="">Todos</option>
            <option value="RECARGA">Recarga</option>
            <option value="RETIRO">Retiro</option>
            <option value="TRANSFERENCIA">Transferencia</option>
          </select>
        </div>

        <div class="filtro">
          <label>Fecha inicio</label>
          <input type="date" id="fechaInicio">
        </div>

        <div class="filtro">
          <label>Fecha fin</label>
          <input type="date" id="fechaFin">
        </div>

        <button class="btn" onclick="limpiar()">Limpiar</button>
      </div>

      <div id="lista"></div>
      <div id="paginacion" class="paginacion"></div>
    </div>
  </div>

  <div id="detalle" class="popup hidden">
    <div class="detalle-box">
      <span class="cerrar" onclick="cerrarDetalle()">×</span>
      <div id="detalleContenido"></div>
    </div>
  </div>

  <div id="popupConfirmacion" class="popup hidden">
    <div class="popup-content">
      <p id="mensajeConfirmacion"></p>
      <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
        <button id="btnConfirmar">Confirmar</button>
        <button id="btnCancelar" onclick="cerrarPopupConfirmacion()">
          Cancelar
        </button>
      </div>
    </div>
  </div>

  <script>
    /**
     * Datos del usuario autenticado obtenidos desde la sesión.
     * @type {Object|null}
     */
    const usuario = JSON.parse(sessionStorage.getItem("usuario"));

    /**
     * Listado completo de transacciones históricas del usuario.
     * @type {Array<Object>}
     */
    let transacciones = [];

    /**
     * Índice de la página de transacciones que se muestra actualmente en la interfaz.
     * @type {number}
     */
    let paginaActual = 1;

    /**
     * Cantidad máxima de transacciones visibles por cada página de la lista.
     * @type {number}
     */
    const porPagina = 5;

    if (!usuario) window.location.href = "/login.html";

    /**
     * Obtiene el historial de transacciones del usuario desde el servidor, las ordena cronológicamente y reinicia la paginación.
     * @returns {Promise<void>}
     */
    async function cargar() {
      const res = await fetch(`http://localhost:8080/transacciones/historial/${usuario.cedula}`);
      transacciones = await res.json();

      transacciones.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

      paginaActual = 1;
      render(true);
    }

    /**
     * Filtra el listado global de transacciones según los criterios de tipo y rango de fechas seleccionados en la interfaz.
     * @returns {Array<Object>} Listado de transacciones que cumplen con los filtros.
     */
    function obtenerFiltradas() {
      const tipo = document.getElementById("tipo").value;
      const inicio = document.getElementById("fechaInicio").value;
      const fin = document.getElementById("fechaFin").value;

      return transacciones.filter(t => {
        const fecha = t.fecha.split("T")[0];

        if (tipo && t.tipo !== tipo) return false;
        if (inicio && fecha < inicio) return false;
        if (fin && fecha > fin) return false;

        return true;
      });
    }

    /**
     * Controla el flujo visual y de animación para actualizar la lista de transacciones en el DOM.
     * @param {boolean} [sinAnimacion=false] - Indica si se debe omitir el efecto visual de transición.
     * @returns {void}
     */
    function render(sinAnimacion = false) {
      const lista = document.getElementById("lista");

      if (!sinAnimacion) {
        lista.classList.add("fade");
        setTimeout(() => dibujar(), 200);
      } else {
        dibujar();
      }

      /**
       * Procesa las transacciones filtradas, calcula el rango de la página actual e inyecta las tarjetas de transacciones en el DOM.
       * @returns {void}
       */
      function dibujar() {
        lista.classList.remove("fade");
        lista.classList.add("lista-animada");

        lista.innerHTML = "";

        const filtradas = obtenerFiltradas();

        const inicio = (paginaActual - 1) * porPagina;
        const fin = inicio + porPagina;

        const pagina = filtradas.slice(inicio, fin);

        pagina.forEach(t => {
          lista.innerHTML += `
          <div class="transaccion">
            <div>
              <b>${obtenerNombreTransaccion(t)}</b><br>
              ${formatearFecha(t.fecha)} - 
              <span style="color: ${obtenerColorTransaccion(t)}; font-weight: bold;">
                $${formatearNumero(
            t.tipo === "TRANSFERENCIA"
              ? (
                t.billeteraDestinoId &&
                usuario.billeteras[t.billeteraDestinoId]
              )
                ? t.valor
                : t.valor + t.comision
              : t.valor
          )}
              </span>
            </div>
            <button class="btn" onclick='verDetalle(${JSON.stringify(t)})'>Detalles</button>
          </div>
        `;
        });

        renderPaginacion(filtradas.length);
      }
    }

    /**
     * Determina la etiqueta comercial o descriptiva de una transacción según su naturaleza (envío o recepción).
     * @param {Object} t - Objeto de la transacción evaluada.
     * @returns {string} Texto descriptivo del tipo de transacción.
     */
    function obtenerNombreTransaccion(t) {
      if (t.tipo !== "TRANSFERENCIA") {
        return t.tipo;
      }

      const esRecibida = t.billeteraDestinoId && usuario.billeteras[t.billeteraDestinoId];

      return esRecibida ? "TRANSFERENCIA RECIBIDA" : "TRANSFERENCIA ENVIADA";
    }

    /**
     * Construye e inyecta los controles de navegación de la paginación en base al volumen total de elementos.
     * @param {number} total - Cantidad total de transacciones que coinciden con los filtros.
     * @returns {void}
     */
    function renderPaginacion(total) {
      const cont = document.getElementById("paginacion");
      cont.innerHTML = "";

      const totalPaginas = Math.ceil(total / porPagina);

      if (totalPaginas <= 1) return;

      cont.innerHTML = `
      <button class="btn" onclick="cambiarPagina(-1)" ${paginaActual === 1 ? 'disabled' : ''}>←</button>
      <span style="align-self:center;">Página ${paginaActual} de ${totalPaginas}</span>
      <button class="btn" onclick="cambiarPagina(1)" ${paginaActual === totalPaginas ? 'disabled' : ''}>→</button>
    `;
    }

    /**
     * Desplaza la vista a la página de resultados anterior o posterior y actualiza la interfaz.
     * @param {number} dir - Dirección del cambio de página (usualmente -1 o 1).
     * @returns {void}
     */
    function cambiarPagina(dir) {
      paginaActual += dir;
      render();
    }

    /**
     * Asigna un color representativo según el impacto financiero (ingreso o egreso) de la transacción.
     * @param {Object} t - Objeto de la transacción evaluada.
     * @returns {string} Nombre del color en inglés (green, red, black) correspondiente.
     */
    function obtenerColorTransaccion(t) {
      if (t.tipo === "RECARGA") {
        return "green";
      }

      if (t.tipo === "RETIRO") {
        return "red";
      }

      if (t.tipo === "TRANSFERENCIA") {
        const esRecibida = t.billeteraDestinoId && usuario.billeteras[t.billeteraDestinoId];
        return esRecibida ? "green" : "red";
      }

      return "black";
    }

    /**
     * Despliega una sección flotante o modal con los metadatos extendidos de una transacción específica.
     * @param {Object} t - Objeto de la transacción a detallar.
     * @returns {void}
     */
    function verDetalle(t) {
      document.getElementById("detalleContenido").innerHTML = `
        <p><b>ID:</b> ${t.id}</p>
        <p><b>Tipo:</b> ${t.tipo}</p>
        <p><b>Fecha:</b> ${formatearFecha(t.fecha)}</p>
        <p><b>Valor:</b> $${formatearNumero(t.valor)}</p>
        <p><b>Comisión:</b> $${formatearNumero(t.comision || 0)}</p>
        <p><b>Billetera origen:</b> ${t.billeteraOrigenId || '-'}</p>
        <p><b>Billetera destino:</b> ${t.billeteraDestinoId || '-'}</p>
        <p><b>Estado:</b> ${t.estado}</p>

        ${t.tipo === "TRANSFERENCIA" &&
          t.estado !== "REVERTIDA"
          ? `
              <button 
                class="btn"
                style="margin-top:20px;"
                onclick="confirmarReversion('${t.id}', '${t.fecha}')"
              >
                Revertir Transferencia
              </button>
            `
          : ""
        }
      `;
      document.getElementById("detalle").classList.remove("hidden");
    }

    /**
     * Convierte una cadena de fecha en formato ISO a una estructura localizada en español colombiano con formato de 12 horas.
     * @param {string} fechaISO - Fecha en formato estándar ISO de origen.
     * @returns {string} Fecha y hora formateada para el usuario.
     */
    function formatearFecha(fechaISO) {
      const f = new Date(fechaISO);

      const dia = f.getDate();
      const mes = f.toLocaleString("es-CO", { month: "long" });
      const anio = f.getFullYear();

      let horas = f.getHours();
      const minutos = String(f.getMinutes()).padStart(2, "0");
      const segundos = String(f.getSeconds()).padStart(2, "0");

      const ampm = horas >= 12 ? "p.m." : "a.m.";
      horas = horas % 12 || 12;

      return `${dia} de ${mes} ${anio}, ${horas}:${minutos}:${segundos} ${ampm}`;
    }

    /**
     * Transforma un valor numérico a una representación con separadores de miles y decimales regionales (Colombia).
     * @param {number|string} valor - Número o cadena numérica a procesar.
     * @returns {string} Cadena numérica con formato localizado.
     */
    function formatearNumero(valor) {
      return Number(valor).toLocaleString("es-CO");
    }

    /**
     * Oculta de la vista el contenedor de los metadatos de la transacción.
     * @returns {void}
     */
    function cerrarDetalle() {
      document.getElementById("detalle").classList.add("hidden");
    }

    /**
     * Oculta el diálogo o ventana emergente de confirmación de operaciones del usuario.
     * @returns {void}
     */
    function cerrarPopupConfirmacion() {
      document.getElementById("popupConfirmacion")
        .classList.add("hidden");
    }

    /**
     * Muestra un mensaje emergente de notificación de carácter informativo con un único botón de aceptación.
     * @param {string} mensaje - Texto o advertencia a desplegar en la interfaz.
     * @returns {void}
     */
    function mostrarPopup(mensaje) {

      document.getElementById("mensajeConfirmacion")
        .innerText = mensaje;

      const btnConfirmar =
        document.getElementById("btnConfirmar");

      const btnCancelar =
        document.getElementById("btnCancelar");

      btnConfirmar.style.display = "inline-block";
      btnCancelar.style.display = "none";

      btnConfirmar.innerText = "Aceptar";
      btnConfirmar.onclick = () => {
        cerrarPopupConfirmacion();
      };

      document.getElementById("popupConfirmacion")
        .classList.remove("hidden");
    }

    /**
     * Evalúa la viabilidad temporal del reverso de una transferencia y solicita confirmación de acción al usuario si aplica.
     * @param {string} id - Identificador único de la transferencia.
     * @param {string} fecha - Fecha de creación de la transferencia para validar el límite de tiempo.
     * @returns {void}
     */
    function confirmarReversion(id, fecha) {

      const diferencia =
        (new Date() - new Date(fecha)) / 1000;

      if (diferencia > 60) {

        mostrarPopup(
          "No se puede revertir una transferencia si ya pasó más de 1 minuto"
        );

        return;
      }

      document.getElementById("mensajeConfirmacion")
        .innerText =
        "¿Deseas revertir esta transferencia?";

      const btn = document.getElementById("btnConfirmar");

      btn.style.display = "inline-block";

      btn.onclick = async () => {
        await revertirTransferencia(id);
      };

      document.getElementById("btnCancelar")
        .style.display = "inline-block";
      document.getElementById("popupConfirmacion")
        .classList.remove("hidden");
    }

    /**
     * Solicita la reversión de una transferencia al servidor de manera asíncrona y desencadena validaciones colaterales del estado del usuario.
     * @param {string} id - Identificador único de la transferencia a revertir.
     * @returns {Promise<void>}
     */
    async function revertirTransferencia(id) {
      cerrarPopupConfirmacion();

      const nivelAnterior = usuario.nivel;

      const res = await fetch(
        `http://localhost:8080/transacciones/revertir/${usuario.cedula}/${id}`,
        {
          method: "POST"
        }
      );

      const mensaje = await res.text();

      if (!res.ok) {
        mostrarPopup(mensaje);
        return;
      }

      await cargar();
      cerrarDetalle();

      mostrarPopupConfirmacionFinal(
        mensaje,
        async () => {
          await verificarDescensoNivel(nivelAnterior);
        }
      );
    }

    /**
     * Muestra una ventana emergente definitiva al concluir un flujo de negocio y ejecuta un proceso posterior al cerrarse.
     * @param {string} mensaje - Texto informativo final.
     * @param {Function|null} [callback=null] - Función asíncrona o síncrona a ejecutar tras aceptar el mensaje.
     * @returns {void}
     */
    function mostrarPopupConfirmacionFinal(mensaje, callback = null) {
      document.getElementById("mensajeConfirmacion")
        .innerText = mensaje;

      const btn =
        document.getElementById("btnConfirmar");

      btn.style.display = "inline-block";
      btnCancelar.style.display = "none";
      btn.innerText = "Aceptar";

      btn.onclick = async () => {

        cerrarPopupConfirmacion();

        if (callback) {
          await callback();
        }
      };

      document.getElementById("popupConfirmacion")
        .classList.remove("hidden");
    }

    /**
     * Consulta el estado del usuario tras una reversión para verificar si bajó de categoría, actualizando la sesión local en el proceso.
     * @param {string|number} nivelAnterior - Nivel o rango que poseía el usuario previo a la operación.
     * @returns {Promise<void>}
     */
    async function verificarDescensoNivel(
      nivelAnterior
    ) {

      const res = await fetch(
        `http://localhost:8080/usuarios/${usuario.cedula}`
      );

      const usuarioActualizado = await res.json();

      if (usuarioActualizado.nivel !== nivelAnterior) {

        usuario.nivel =
          usuarioActualizado.nivel;

        sessionStorage.setItem(
          "usuario",
          JSON.stringify(usuario)
        );

        mostrarPopup(
          `Lo lamentamos, has descendido al nivel ${usuarioActualizado.nivel}`
        );
      }
    }

    /**
     * Restablece los inputs de filtrado y los límites de fechas a su estado vacío inicial, refrescando la visualización de datos.
     * @returns {void}
     */
    function limpiar() {
      document.getElementById("tipo").value = "";
      document.getElementById("fechaInicio").value = "";
      document.getElementById("fechaFin").value = "";

      document.getElementById("fechaFin").min = "";
      document.getElementById("fechaInicio").max = "";

      paginaActual = 1;
      render();
    }

    /**
     * Escucha el cambio en la fecha de inicio para restringir el límite mínimo de la fecha final,
     * reiniciar la paginación y refrescar la vista de transacciones.
     */
    document.getElementById("fechaInicio").addEventListener("change", e => {
      const inicio = e.target.value;
      const finInput = document.getElementById("fechaFin");

      finInput.min = inicio;

      if (finInput.value && finInput.value < inicio) {
        finInput.value = "";
      }

      paginaActual = 1;
      render();
    });

    /**
     * Escucha el cambio en la fecha de fin para restringir el límite máximo de la fecha inicial,
     * reiniciar la paginación y refrescar la vista de transacciones.
     */
    document.getElementById("fechaFin").addEventListener("change", e => {
      const fin = e.target.value;

      document.getElementById("fechaInicio").max = fin;

      paginaActual = 1;
      render();
    });

    /**
     * Escucha el cambio en el selector de tipo de transacción para reiniciar la paginación 
     * y aplicar el nuevo filtro en la vista.
     */
    document.getElementById("tipo").addEventListener("change", () => {
      paginaActual = 1;
      render();
    });

    /**
     * Destruye las credenciales de la sesión activa del usuario para desautenticarlo del sistema.
     * @returns {void}
     */
    function logout() {
      sessionStorage.removeItem("usuario");
    }

    cargar();
  </script>

</body>

</html>
