<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Alertas</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;

      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);

      background-blend-mode: screen;

      color: white;
    }

    .fade-table {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.25s ease;
    }

    .fade-table.out {
      opacity: 0;
      transform: translateY(8px);
    }

    .sidebar {
      width: 220px;

      background: rgba(7, 68, 109, 0.25);

      backdrop-filter: blur(20px);

      border-right: 1px solid rgba(255, 255, 255, 0.08);

      display: flex;
      flex-direction: column;
      justify-content: space-between;

      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;

      padding: 12px 15px;

      border-radius: 14px;

      cursor: pointer;

      transition: all 0.2s ease;

      text-decoration: none;

      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 25px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .filtros {
      background: white;

      padding: 15px;

      border-radius: 15px;

      margin-bottom: 20px;

      display: grid;

      grid-template-columns: 1fr 1fr 1fr 1fr auto;

      gap: 12px;

      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);

      align-items: end;
    }

    .filtros input,
    .filtros select {
      padding: 12px;

      border-radius: 12px;

      border: 1px solid #dbe2ea;

      outline: none;

      background: #f8fafc;
    }

    .filtro-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filtro-group label {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      padding-left: 2px;
    }

    .tabla {
      background: white;

      border-radius: 15px;

      padding: 15px;

      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);

      height: calc(100vh - 170px);

      display: flex;
      flex-direction: column;
    }

    .table-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f8fafc;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 10;
    }

    th {
      text-align: left;
      padding: 14px;
      font-size: 12px;
      color: #64748b;
    }

    td {
      padding: 14px;
      border-top: 1px solid #eee;
      font-size: 13px;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      display: inline-block;
    }

    .TRANSFERENCIA {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .RECARGA {
      background: #dcfce7;
      color: #15803d;
    }

    .RETIRO {
      background: #fee2e2;
      color: #b91c1c;
    }

    .BAJO {
      background: #fef3c7;
      color: #b45309;
    }

    .MEDIO {
      background: #fed7aa;
      color: #c2410c;
    }

    .ALTO {
      background: #fecaca;
      color: #991b1b;
    }

    .btn {
      border: none;

      background: #4d82bc;

      color: white;

      padding: 12px 16px;

      border-radius: 12px;

      cursor: pointer;
    }

    .paginacion {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .alertas-lista {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .alerta-item {
      background: #fff7ed;
      color: #9a3412;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      width: fit-content;
    }

    @media(max-width: 1200px) {

      .filtros {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>

</head>

<body>

  <nav class="sidebar">

    <div class="nav-group">

      <a href="/dashboard.html" class="nav-item">
        <img src="images/dashboard.svg">
        <span>Dashboard</span>
      </a>

      <a href="/usuarios.html" class="nav-item">
        <img src="images/usuarios.svg">
        <span>Usuarios</span>
      </a>

      <a href="/billeteras.html" class="nav-item">
        <img src="images/billeteras.svg">
        <span>Billeteras</span>
      </a>

      <a href="/transacciones.html" class="nav-item">
        <img src="images/transacciones.svg">
        <span>Transacciones</span>
      </a>

      <a href="/relaciones.html" class="nav-item">
        <img src="images/relaciones.svg">
        <span>Relaciones</span>
      </a>

      <a href="/alertas.html" class="nav-item">
        <img src="images/alertas.svg">
        <span>Alertas</span>
      </a>

    </div>

    <div class="nav-group">

      <a href="/login.html" class="nav-item">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>

    </div>

  </nav>

  <div class="content">

    <h1 class="titulo">
      Alertas de fraude
    </h1>

    <div class="filtros">

      <div class="filtro-group">

        <label>Fecha inicio</label>

        <input type="date" id="fechaInicio">

      </div>

      <div class="filtro-group">

        <label>Fecha fin</label>

        <input type="date" id="fechaFin">

      </div>

      <div class="filtro-group">

        <label>Tipo transacción</label>

        <select id="filtroTipo">

          <option value="">Todos los tipos</option>

          <option value="TRANSFERENCIA">Transferencia</option>

          <option value="RECARGA">Recarga</option>

          <option value="RETIRO">Retiro</option>

        </select>

      </div>

      <div class="filtro-group">

        <label>Nivel riesgo</label>

        <select id="filtroRiesgo">

          <option value="">Todos los niveles</option>

          <option value="BAJO">Bajo</option>

          <option value="MEDIO">Medio</option>

          <option value="ALTO">Alto</option>

        </select>

      </div>

      <button class="btn" onclick="limpiarFiltros()">
        Limpiar
      </button>

    </div>

    <div class="tabla">

      <div class="table-wrapper">

        <table>

          <thead>

            <tr>

              <th>Tipo</th>

              <th>Nivel riesgo</th>

              <th>Valor</th>

              <th>Origen</th>

              <th>Destino</th>

              <th>Fecha</th>

              <th>Alertas</th>

            </tr>

          </thead>

          <tbody id="tablaAlertas"></tbody>

        </table>

      </div>

      <div class="paginacion">

        <button class="btn" id="btnAnterior" onclick="cambiarPagina(-1)">
          ←
        </button>

        <span id="paginaTexto"></span>

        <button class="btn" id="btnSiguiente" onclick="cambiarPagina(1)">
          →
        </button>

      </div>

    </div>

  </div>

  <script>

    let alertas = [];

    let paginaActual = 1;

    const porPagina = 7;

    const formatoCOP = new Intl.NumberFormat("es-CO", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });

    function formatearFecha(fechaISO) {

      const fecha = new Date(fechaISO);

      return fecha.toLocaleString("es-CO", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function cargarDatos() {

      const response = await fetch(
        "http://localhost:8080/fraude"
      );

      alertas = await response.json();

      renderTabla();
    }

    function obtenerFiltradas() {

      const tipo =
        document.getElementById("filtroTipo").value;

      const riesgo =
        document.getElementById("filtroRiesgo").value;

      const fechaInicio =
        document.getElementById("fechaInicio").value;

      const fechaFin =
        document.getElementById("fechaFin").value;

      return alertas.filter(t => {

        const coincideTipo =
          !tipo || t.tipo === tipo;

        const coincideRiesgo =
          !riesgo || t.nivelRiesgo === riesgo;

        const fechaTransaccion =
          new Date(t.fecha);

        let coincideInicio = true;

        let coincideFin = true;

        if (fechaInicio) {

          coincideInicio =
            fechaTransaccion >= new Date(fechaInicio);
        }

        if (fechaFin) {

          const fin =
            new Date(fechaFin);

          fin.setHours(23, 59, 59, 999);

          coincideFin =
            fechaTransaccion <= fin;
        }

        return coincideTipo
          && coincideRiesgo
          && coincideInicio
          && coincideFin;
      });
    }

    function limpiarFiltros() {

      document.getElementById("fechaInicio").value = "";

      document.getElementById("fechaFin").value = "";

      document.getElementById("filtroTipo").value = "";

      document.getElementById("filtroRiesgo").value = "";

      paginaActual = 1;

      renderTabla();
    }

    function renderTabla() {

      const tabla =
        document.getElementById("tablaAlertas");

      tabla.classList.add("out");

      setTimeout(() => {

        const filtradas =
          obtenerFiltradas();

        filtradas.sort((a, b) =>
          new Date(b.fecha) - new Date(a.fecha)
        );

        const inicio =
          (paginaActual - 1) * porPagina;

        const fin =
          inicio + porPagina;

        const pagina =
          filtradas.slice(inicio, fin);

        tabla.innerHTML = "";

        pagina.forEach(t => {

          tabla.innerHTML += `
          
          <tr>

            <td>
              <span class="badge ${t.tipo}">
                ${t.tipo}
              </span>
            </td>

            <td>
              <span class="badge ${t.nivelRiesgo}">
                ${t.nivelRiesgo}
              </span>
            </td>

            <td>
              $ ${formatoCOP.format(t.valor)}
            </td>

            <td>
              ${t.billeteraOrigenId || "-"}
            </td>

            <td>
              ${t.billeteraDestinoId || "-"}
            </td>

            <td>
              ${formatearFecha(t.fecha)}
            </td>

            <td>

              <div class="alertas-lista">

                ${(t.alertasFraude || []).map(alerta => `
                  
                  <div class="alerta-item">
                    ${alerta}
                  </div>

                `).join("")}

              </div>

            </td>

          </tr>
          
          `;
        });

        renderPaginacion(filtradas.length);

        tabla.classList.remove("out");

      }, 150);
    }

    function renderPaginacion(total) {

      const totalPaginas =
        Math.ceil(total / porPagina);

      document.getElementById("paginaTexto")
        .textContent =
        `Página ${paginaActual} de ${totalPaginas || 1}`;

      document.getElementById("btnAnterior")
        .disabled =
        paginaActual === 1;

      document.getElementById("btnSiguiente")
        .disabled =
        paginaActual >= totalPaginas;
    }

    function cambiarPagina(direccion) {

      const total =
        obtenerFiltradas().length;

      const totalPaginas =
        Math.ceil(total / porPagina) || 1;

      const nuevaPagina =
        paginaActual + direccion;

      if (nuevaPagina < 1) return;

      if (nuevaPagina > totalPaginas) return;

      paginaActual = nuevaPagina;

      renderTabla();
    }

    const inputInicio =
      document.getElementById("fechaInicio");

    const inputFin =
      document.getElementById("fechaFin");

    inputInicio.addEventListener("change", () => {

      if (inputInicio.value) {

        inputFin.min =
          inputInicio.value;
      } else {

        inputFin.min = "";
      }

      if (
        inputFin.value &&
        inputFin.value < inputInicio.value
      ) {

        inputFin.value =
          inputInicio.value;
      }

      paginaActual = 1;

      renderTabla();
    });

    inputFin.addEventListener("change", () => {

      if (inputFin.value) {

        inputInicio.max =
          inputFin.value;
      } else {

        inputInicio.max = "";
      }

      if (
        inputInicio.value &&
        inputInicio.value > inputFin.value
      ) {

        inputInicio.value =
          inputFin.value;
      }

      paginaActual = 1;

      renderTabla();
    });

    document.getElementById("filtroTipo")
      .addEventListener("change", () => {

        paginaActual = 1;

        renderTabla();
      });

    document.getElementById("filtroRiesgo")
      .addEventListener("change", () => {

        paginaActual = 1;

        renderTabla();
      });

    cargarDatos();

    document.getElementById("tablaAlertas")
      .classList.add("fade-table");

    setInterval(() => {

      cargarDatos();

    }, 5000);

  </script>

</body>

</html>
