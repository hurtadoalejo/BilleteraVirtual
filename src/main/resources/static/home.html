<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: #0f172a;
      color: white;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
    }

    .sidebar {
      width: 220px;

      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);

      border-right: 1px solid rgba(255, 255, 255, 0.08);

      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item span {
      font-size: 15px;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-item.active {
      background: rgba(77, 130, 188, 0.5);
      box-shadow: 0 0 10px rgba(77, 130, 188, 0.4);
    }

    .nav-item:active {
      transform: scale(0.96);
    }

    .content {
      background-color: #F3F6FF;
      color: black;
      flex: 1;
      padding: 30px;
    }
  </style>
</head>

<body>

  <nav class="sidebar">

    <div class="nav-group">
      <a class="nav-item">
        <img src="home.svg">
        <span>Inicio</span>
      </a>

      <a class="nav-item">
        <img src="billeteras.svg">
        <span>Billeteras</span>
      </a>

      <a class="nav-item">
        <img src="recargar.svg">
        <span>Recargar</span>
      </a>

      <a class="nav-item">
        <img src="retirar.svg">
        <span>Retirar</span>
      </a>

      <a class="nav-item">
        <img src="transferir.svg">
        <span>Transferir</span>
      </a>

      <a class="nav-item">
        <img src="historial.svg">
        <span>Historial</span>
      </a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item">
        <img src="cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>

  </nav>

  <div class="content">
    <h1>Algo algo</h1>
  </div>

</body>

</html>
