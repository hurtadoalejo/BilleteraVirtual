<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios</title>

  <style>
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 130, 188, 0.6), transparent 40%),
        radial-gradient(circle at 50% 50%, #4d82bc, #005187);
      background-blend-mode: screen;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(7, 68, 109, 0.25);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: white;
    }

    .nav-item img {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .content {
      flex: 1;
      background: #F3F6FF;
      color: #1e293b;
      padding: 35px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .busqueda {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
    }

    #lista {
      flex: 1;
      overflow-y: auto;
    }

    .usuario {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .usuario-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      flex: 1;
      font-size: 13px;
    }

    .label {
      color: #64748b;
      font-size: 11px;
      display: block;
      margin-bottom: 3px;
    }

    .value {
      font-weight: bold;
      color: #1e293b;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #4d82bc;
      color: white;
    }

    .btn-delete {
      background: #ef4444;
    }

    .paginacion {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding-top: 15px;
    }

    .lista-animada {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.3s ease;
    }

    .lista-animada.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background: rgba(77, 130, 188, 0.85);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .popup-content button {
      margin-top: 15px;
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <nav class="sidebar">

    <div class="nav-group">
      <a href="/dashboard.html" class="nav-item"><img src="images/dashboard.svg"><span>Dashboard</span></a>
      <a href="/usuarios.html" class="nav-item"><img src="images/usuarios.svg"><span>Usuarios</span></a>
      <a href="/billeteras.html" class="nav-item"><img src="images/billeteras.svg"><span>Billeteras</span></a>
      <a href="/transacciones.html" class="nav-item"><img src="images/transacciones.svg"><span>Transacciones</span></a>
      <a href="/relaciones.html" class="nav-item"><img src="images/relaciones.svg"><span>Relaciones</span></a>
      <a href="/alertas.html" class="nav-item"><img src="images/alertas.svg"><span>Alertas</span></a>
    </div>

    <div class="nav-group">
      <a href="/login.html" class="nav-item" onclick="logout()">
        <img src="images/cerrar-sesion.svg">
        <span>Cerrar sesión</span>
      </a>
    </div>

  </nav>

  <div class="content">

    <div class="container">

      <h1 class="titulo">Usuarios registrados</h1>

      <div class="card">
        <input type="text" id="buscarCedula" class="busqueda" placeholder="Buscar por cédula...">
      </div>

      <div id="lista"></div>

      <div id="paginacion" class="paginacion"></div>

    </div>

  </div>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <p id="popupMensaje"></p>

      <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
        <button id="btnConfirmar">Confirmar</button>
        <button onclick="cerrarPopup()">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * Arreglo global que almacena el listado consolidad de cuentas de usuario del sistema.
     * @type {Array<Object>}
     */
    let usuarios = [];

    /**
     * Índice de la página de datos que se expone visualmente en la interfaz del panel.
     * @type {number}
     */
    let paginaActual = 1;

    /**
     * Número límite de tarjetas o bloques informativos de usuarios permitidos por sección.
     * @type {number}
     */
    const porPagina = 4;

    /**
     * Formateador de valores numéricos configurado bajo la notación estándar regional (Colombia).
     * @type {Intl.NumberFormat}
     */
    const formatoCOP = new Intl.NumberFormat("es-CO");

    /**
     * Realiza una consulta asíncrona al servicio central para actualizar la memoria de usuarios y comanda la regeneración del árbol visual, controlando la posición de la página.
     * @param {boolean} [recargaAutomatica=false] - Indica si la petición procede de una rutina cíclica en segundo plano para evitar reiniciar el posicionamiento de la paginación.
     * @returns {Promise<void>}
     */
    async function cargarUsuarios(recargaAutomatica = false) {
      const textoBusqueda = document.getElementById("buscarCedula").value;
      const res = await fetch("http://localhost:8080/usuarios");
      usuarios = await res.json();
      document.getElementById("buscarCedula").value = textoBusqueda;

      if (!recargaAutomatica) {
        paginaActual = 1;
      }

      render(true);
    }

    /**
     * Examina el control de entrada de texto e implementa un filtrado por coincidencia de caracteres sobre los documentos de identidad de los usuarios registrados.
     * @returns {Array<Object>} Arreglo depurado con los perfiles que cumplen con la condición de búsqueda.
     */
    function obtenerFiltrados() {

      const texto =
        document.getElementById("buscarCedula")
          .value
          .trim();

      if (!texto) return usuarios;

      return usuarios.filter(u =>
        u.cedula.includes(texto)
      );
    }

    /**
     * Gestiona las clases de transición visual y segmenta la colección de perfiles según la página activa para inyectar dinámicamente los bloques informativos y las acciones del administrador en el DOM.
     * @param {boolean} [sinAnimacion=false] - Define si se omite el retardo cronometrado de los efectos de desvanecimiento en la interfaz.
     * @returns {void}
     */
    function render(sinAnimacion = false) {

      const lista =
        document.getElementById("lista");

      if (!sinAnimacion) {

        lista.classList.add("fade");

        setTimeout(() => dibujar(), 200);

      } else {

        dibujar();
      }

      function dibujar() {

        lista.classList.remove("fade");

        lista.classList.add("lista-animada");

        const filtrados =
          obtenerFiltrados();

        const inicio =
          (paginaActual - 1) * porPagina;

        const fin = inicio + porPagina;

        const pagina =
          filtrados.slice(inicio, fin);

        lista.innerHTML = "";

        pagina.forEach(u => {

          const totalTransacciones = u.transaccionesTotal;

          lista.innerHTML += `
            <div class="usuario">

              <div class="usuario-info">

                <div>
                  <span class="label">Nombre</span>
                  <span class="value">${u.nombreCompleto}</span>
                </div>

                <div>
                  <span class="label">Cédula</span>
                  <span class="value">${u.cedula}</span>
                </div>

                <div>
                  <span class="label">Puntos</span>
                  <span class="value">${u.puntos}</span>
                </div>

                <div>
                  <span class="label">Nivel</span>
                  <span class="value">${u.nivel}</span>
                </div>

                <div>
                  <span class="label">Correo</span>
                  <span class="value">${u.correoElectronico}</span>
                </div>

                <div>
                  <span class="label">Teléfono</span>
                  <span class="value">${u.numeroTelefonico}</span>
                </div>

                <div>
                  <span class="label">Transacciones</span>
                  <span class="value">${totalTransacciones}</span>
                </div>

                <div>
                  <span class="label">Saldo total</span>
                  <span class="value">
                    $ ${formatoCOP.format(u.saldoTotal)}
                  </span>
                </div>

              </div>

              <button
                class="btn btn-delete"
                onclick="confirmarEliminar('${u.cedula}')"
              >
                Eliminar
              </button>

            </div>
          `;
        });

        renderPaginacion(filtrados.length);
      }
    }

    /**
     * Evalúa la cantidad global de elementos coincidentes para construir, deshabilitar o suprimir los controles de paginación e inyectar el estado de posición en el DOM.
     * @param {number} total - Sumatoria de registros aptos para visualización tras el filtrado.
     * @returns {void}
     */
    function renderPaginacion(total) {

      const cont =
        document.getElementById("paginacion");

      cont.innerHTML = "";

      const totalPaginas =
        Math.ceil(total / porPagina);

      if (totalPaginas <= 1) return;

      cont.innerHTML = `
        <button
          class="btn"
          onclick="cambiarPagina(-1)"
          ${paginaActual === 1 ? 'disabled' : ''}
        >
          ←
        </button>

        <span style="align-self:center;">
          Página ${paginaActual} de ${totalPaginas}
        </span>

        <button
          class="btn"
          onclick="cambiarPagina(1)"
          ${paginaActual === totalPaginas ? 'disabled' : ''}
        >
          →
        </button>
      `;
    }

    /**
     * Modifica algebraicamente el valor de la página actual y dispara la reconstrucción estructural de la vista del panel.
     * @param {number} dir - Factor multiplicador de movimiento posicional o dirección (e.g., -1 para retroceder, 1 para avanzar).
     * @returns {void}
     */
    function cambiarPagina(dir) {

      paginaActual += dir;

      render();
    }

    /**
     * Intercepta la acción de borrado, escribe la advertencia contextual en la ventana modal y vincula dinámicamente el identificador del usuario al evento de confirmación asíncrona.
     * @param {string} cedula - Documento de identidad del usuario objetivo.
     * @returns {void}
     */
    function confirmarEliminar(cedula) {

      document.getElementById("popupMensaje")
        .innerText =
        "¿Deseas eliminar este usuario?";

      document.getElementById("btnConfirmar")
        .onclick = async () => {
          await eliminarUsuario(cedula);
        };

      document.getElementById("popup")
        .classList.remove("hidden");
    }

    /**
     * Envía una petición de borrado físico o lógico al servidor web mediante el identificador provisto y desencadena la actualización del listado global.
     * @param {string} cedula - Documento de identidad único del usuario que se va a suprimir.
     * @returns {Promise<void>}
     */
    async function eliminarUsuario(cedula) {

      cerrarPopup();

      const res = await fetch(
        `http://localhost:8080/usuarios/${cedula}`,
        {
          method: "DELETE"
        }
      );

      if (!res.ok) {
        alert("No se pudo eliminar");
        return;
      }

      await cargarUsuarios();
    }

    /**
     * Adiciona la clase de aislamiento visual para ocultar la ventana emergente modal de la vista del administrador.
     * @returns {void}
     */
    function cerrarPopup() {

      document.getElementById("popup")
        .classList.add("hidden");
    }

    /**
     * Escucha la inserción de caracteres en el cuadro de búsqueda para reiniciar el puntero de paginación y filtrar interactivamente los usuarios en pantalla.
     */
    document.getElementById("buscarCedula")
      .addEventListener("input", () => {

        paginaActual = 1;

        render();
      });

    /**
     * Remueve el registro de credenciales del usuario de la sesión para bloquear los privilegios de navegación.
     * @returns {void}
     */
    function logout() {
      sessionStorage.removeItem("usuario");
    }

    cargarUsuarios();

    /**
     * Inicializa una rutina temporizada e indefinida para re-consultar de forma silenciosa el servidor y sincronizar los datos mutados por otros clientes.
     */
    setInterval(() => {
      cargarUsuarios(true);
    }, 5000);

  </script>

</body>

</html>
